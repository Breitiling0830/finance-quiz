<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="財管刷題">
<meta name="theme-color" content="#ffffff">
<title>財管刷題</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📚%3C/text%3E%3C/svg%3E">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", "Helvetica Neue", sans-serif;
    background: #f5f5f0;
    color: #1f1f1d;
    line-height: 1.6;
    font-size: 15px;
    padding: 16px;
    max-width: 600px;
    margin: 0 auto;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  h1 { font-size: 22px; font-weight: 600; margin: 8px 0 16px; }
  h2 { font-size: 17px; font-weight: 600; margin: 20px 0 10px; color: #555; }
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  .stat-card {
    background: #ffffff;
    border-radius: 12px;
    padding: 14px;
    border: 1px solid #e8e6df;
  }
  .stat-label {
    font-size: 12px;
    color: #888;
    margin-bottom: 4px;
  }
  .stat-num {
    font-size: 24px;
    font-weight: 600;
    color: #1f1f1d;
  }
  /* 期中/期末切換 */
  .exam-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .exam-tab {
    flex: 1;
    padding: 12px;
    background: #ffffff;
    border: 1px solid #e8e6df;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    color: #888;
    cursor: pointer;
    transition: all 0.15s;
  }
  .exam-tab:active { transform: scale(0.98); }
  .exam-tab.active {
    background: #185fa5;
    color: #ffffff;
    border-color: #185fa5;
  }
  .exam-tab .tab-sub {
    display: block;
    font-size: 11px;
    font-weight: 400;
    margin-top: 2px;
    opacity: 0.85;
  }
  .search-wrap {
    margin-bottom: 16px;
  }
  .search-input {
    width: 100%;
    padding: 11px 14px;
    background: #ffffff;
    border: 1px solid #e8e6df;
    border-radius: 12px;
    font-size: 15px;
    font-family: inherit;
    color: #1f1f1d;
    -webkit-appearance: none;
    appearance: none;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input:focus {
    border-color: #185fa5;
  }
  #search-results {
    margin-top: 10px;
    display: none;
  }
  .search-count {
    font-size: 12px;
    color: #888;
    padding: 4px 4px 8px;
  }
  .search-empty {
    padding: 16px;
    text-align: center;
    font-size: 13px;
    color: #888;
    background: #ffffff;
    border: 1px solid #e8e6df;
    border-radius: 10px;
  }
  .search-item {
    background: #ffffff;
    border: 1px solid #e8e6df;
    border-radius: 10px;
    padding: 11px 13px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .search-item:active {
    transform: scale(0.99);
    background: #f5f5f0;
  }
  .search-item-meta {
    font-size: 11px;
    color: #888;
    margin-bottom: 3px;
  }
  .search-item-stem {
    font-size: 13px;
    line-height: 1.55;
    color: #1f1f1d;
    word-break: break-word;
  }
  mark {
    background: #faeeda;
    color: #854f0b;
    padding: 0 2px;
    border-radius: 2px;
  }
  .badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
  }
  .badge-ok {
    background: #e1f5ee;
    color: #085041;
  }
  .badge-no {
    background: #fcebeb;
    color: #791f1f;
  }
  .mode-card {
    background: #ffffff;
    border: 1px solid #e8e6df;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    user-select: none;
  }
  .mode-card:active { transform: scale(0.98); background: #f5f5f0; }
  .mode-card.disabled { opacity: 0.45; pointer-events: none; }
  .mode-card-static {
    background: #ffffff;
    border: 1px solid #e8e6df;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 10px;
    user-select: none;
  }
  .count-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .count-label {
    font-size: 13px;
    color: #888;
  }
  .count-pills {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    flex: 1;
  }
  .count-pill {
    padding: 6px 12px;
    background: #f5f5f0;
    border: 1px solid #e8e6df;
    border-radius: 999px;
    font-size: 13px;
    color: #555;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .count-pill:active { transform: scale(0.95); }
  .count-pill.active {
    background: #1f1f1d;
    color: #ffffff;
    border-color: #1f1f1d;
  }
  .mode-title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .mode-desc {
    font-size: 13px;
    color: #888;
  }
  .meta-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    font-size: 12px;
    color: #888;
  }
  .progress-bar {
    height: 4px;
    background: #e8e6df;
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 14px;
  }
  .progress-fill {
    height: 100%;
    background: #185fa5;
    transition: width 0.3s;
  }
  .q-card {
    background: #ffffff;
    border: 1px solid #e8e6df;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .q-stem {
    font-size: 15px;
    line-height: 1.75;
    margin-bottom: 14px;
    word-break: break-word;
  }
  .opt {
    display: block;
    width: 100%;
    text-align: left;
    padding: 12px 14px;
    margin-bottom: 8px;
    background: #ffffff;
    border: 1px solid #e8e6df;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.6;
    color: #1f1f1d;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    word-break: break-word;
  }
  .opt:active:not(:disabled) { transform: scale(0.98); }
  .opt:disabled { cursor: default; }
  .opt.correct {
    background: #e1f5ee;
    border-color: #1d9e75;
    color: #085041;
  }
  .opt.wrong {
    background: #fcebeb;
    border-color: #e24b4a;
    color: #791f1f;
  }
  .opt-key {
    display: inline-block;
    width: 22px;
    font-weight: 600;
  }
  .explain {
    margin-top: 14px;
    padding: 14px;
    background: #f5f5f0;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.75;
    color: #555;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .explain b {
    color: #1f1f1d;
    font-weight: 600;
    display: block;
    margin-bottom: 6px;
  }
  .btn-primary {
    width: 100%;
    padding: 13px;
    background: #1f1f1d;
    color: #ffffff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    margin-top: 14px;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn-primary:active { transform: scale(0.98); opacity: 0.85; }
  .btn-secondary {
    width: 100%;
    padding: 11px;
    background: transparent;
    color: #888;
    border: 1px solid #e8e6df;
    border-radius: 10px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    margin-top: 16px;
  }
  .btn-back {
    background: transparent;
    border: none;
    padding: 8px 0;
    font-size: 14px;
    color: #888;
    cursor: pointer;
    font-family: inherit;
    margin-bottom: 6px;
  }
  .complete {
    text-align: center;
    padding: 32px 0;
  }
  .complete-title {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 16px;
  }

  .scan-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 12px;
  }
  .scan-file {
    position: absolute;
    width: 1px;
    height: 1px;
    opacity: 0;
    pointer-events: none;
  }
  .scan-preview {
    width: 100%;
    border-radius: 10px;
    border: 1px solid #e8e6df;
    background: #f5f5f0;
    display: block;
    margin-top: 10px;
  }
  .scan-canvas-wrap {
    position: relative;
    margin-top: 10px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid #e8e6df;
    background: #f5f5f0;
    touch-action: none;
  }
  #scan-crop-canvas {
    width: 100%;
    display: block;
  }
  .scan-status {
    margin-top: 10px;
    padding: 10px 12px;
    border-radius: 10px;
    background: #f5f5f0;
    color: #555;
    font-size: 13px;
    line-height: 1.6;
  }
  .scan-result-card {
    background: #ffffff;
    border: 1px solid #e8e6df;
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
  }
  .scan-result-head {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    align-items: flex-start;
    margin-bottom: 8px;
    font-size: 12px;
    color: #888;
  }
  .scan-answer {
    font-size: 16px;
    font-weight: 700;
    color: #085041;
    margin: 8px 0;
  }
  .scan-answer-option {
    padding: 10px 12px;
    border-radius: 10px;
    background: #e1f5ee;
    color: #085041;
    line-height: 1.6;
    margin-bottom: 8px;
  }
  .scan-candidates {
    display: grid;
    gap: 6px;
    margin-top: 10px;
  }
  .scan-candidate {
    width: 100%;
    text-align: left;
    padding: 9px 10px;
    border-radius: 9px;
    border: 1px solid #e8e6df;
    background: #ffffff;
    color: #1f1f1d;
    font-family: inherit;
    font-size: 13px;
    line-height: 1.45;
  }
  .ocr-textarea {
    width: 100%;
    min-height: 120px;
    padding: 10px 12px;
    border: 1px solid #e8e6df;
    border-radius: 10px;
    background: #ffffff;
    color: #1f1f1d;
    font-family: inherit;
    font-size: 13px;
    line-height: 1.6;
    resize: vertical;
    margin-top: 10px;
  }

  @media (prefers-color-scheme: dark) {
    body { background: #1a1a18; color: #f0efe9; }

    .scan-preview, .scan-canvas-wrap { background: #1a1a18; border-color: #3a3936; }
    .scan-status { background: #1a1a18; color: #b5b3ac; }
    .scan-result-card { background: #28272a; border-color: #3a3936; }
    .scan-answer { color: #9fe1cb; }
    .scan-answer-option { background: #04342c; color: #9fe1cb; }
    .scan-candidate { background: #28272a; border-color: #3a3936; color: #f0efe9; }
    .ocr-textarea { background: #28272a; border-color: #3a3936; color: #f0efe9; }

    .stat-card, .mode-card, .q-card, .mode-card-static { background: #28272a; border-color: #3a3936; }
    .exam-tab { background: #28272a; border-color: #3a3936; color: #999; }
    .exam-tab.active { background: #378add; color: #ffffff; border-color: #378add; }
    .search-input { background: #28272a; border-color: #3a3936; color: #f0efe9; }
    .search-input:focus { border-color: #378add; }
    .search-item { background: #28272a; border-color: #3a3936; }
    .search-item:active { background: #1a1a18; }
    .search-item-stem { color: #f0efe9; }
    .search-empty { background: #28272a; border-color: #3a3936; }
    mark { background: #633806; color: #fac775; }
    .badge-ok { background: #04342c; color: #9fe1cb; }
    .badge-no { background: #501313; color: #f7c1c1; }
    .count-pill { background: #1a1a18; border-color: #3a3936; color: #b5b3ac; }
    .count-pill.active { background: #f0efe9; color: #1a1a18; border-color: #f0efe9; }
    .stat-num { color: #f0efe9; }
    .stat-label, .mode-desc, .meta-row, .btn-back, .btn-secondary { color: #999; }
    .progress-bar { background: #3a3936; }
    .opt { background: #28272a; border-color: #3a3936; color: #f0efe9; }
    .opt.correct { background: #04342c; border-color: #1d9e75; color: #9fe1cb; }
    .opt.wrong { background: #501313; border-color: #e24b4a; color: #f7c1c1; }
    .explain { background: #1a1a18; color: #b5b3ac; }
    .explain b { color: #f0efe9; }
    .btn-primary { background: #f0efe9; color: #1a1a18; }
    .mode-card:active { background: #1a1a18; }
    .btn-secondary { border-color: #3a3936; }
  }
</style>
</head>
<body>
<div id="app"></div>

<script src="vendor/tesseract/tesseract.min.js"></script>

<script>
// ===================================================================
//  財管刷題 — 題庫資料
//  期中考 (midterm): 第 1-7 章 ‧ 123 題
//  期末考 (final):   第 8-14 章 ‧ 125 題
// ===================================================================

// ----- 期中考 第 1-7 章 (exam: "midterm") -----
const MIDTERM_QUESTIONS = [
{exam:"midterm",ch:1,n:1,stem:"財務管理的評價核心為",opts:["公司淨值","營運資金","稅前純益","稅後淨利","現金流量"],ans:4,exp:"財務管理以「現金流量」為評價核心,因為現金流量才是企業真正可運用的資金,且能反映時間價值;會計利潤可能因應計基礎或會計政策而失真。"},
{exam:"midterm",ch:1,n:2,stem:"財務管理的主要內容是",opts:["編製財務報表","計算稅金","採購原物料","進行投資與融資決策","改良商品與技術研發"],ans:3,exp:"財務管理的兩大核心活動為「投資決策」(資金用於何處)與「融資決策」(資金從何取得),其他選項屬於會計、採購、生產或研發部門的工作。"},
{exam:"midterm",ch:1,n:3,stem:"公司長期資產的投資規劃稱為 ___,短期資金的操作稱為 ___",opts:["融資決策、資金週轉","資本結構、股東權益管理","公司治理制度、財務規劃","資本配額、盈餘管理","資本預算、營運資金管理"],ans:4,exp:"「資本預算」針對長期資產(如廠房、設備)的投資規劃;「營運資金管理」處理短期資金(現金、存貨、應收帳款、應付帳款)的調度。"},
{exam:"midterm",ch:1,n:4,stem:"下列何者是美國企業「財務長(Treasurer)」負責的業務?",opts:["財務報告之編製","成本會計","信用管理","所得稅稅務","財務稽核"],ans:2,exp:"美國企業財務長(Treasurer)負責資金管理,包括現金管理、信用管理、籌資、投資;其餘選項(財報編製、成本會計、稅務、稽核)屬於主計長(Controller)的職責。"},
{exam:"midterm",ch:1,n:5,stem:"公司股東大會將改選董監事,若有股東向其他股東要求代表出席,行使投票權利,此種現象稱為",opts:["委託書爭奪戰","衍生性商品交易","代理人問題","惡意併購","內線交易"],ans:0,exp:"「委託書爭奪戰(Proxy Fight)」指爭取其他股東的委託書以取得董監事席次的行為,是公司控制權爭奪的方式之一。"},
{exam:"midterm",ch:1,n:6,stem:"下列何者對日本「系列企業(Kereitsu)」的描述最正確?",opts:["上下游企業結盟低價排擠對手","關係企業,間接降低惡意併購","策略聯盟改善品質或銷售","相互債權保證增加公信力","海外子公司移轉價格降稅"],ans:1,exp:"日本系列企業(Kereitsu)是以銀行或大企業為核心的關係企業集團,成員間相互持股,可形成綿密的股權結構,間接降低被惡意併購的可能性。"},
{exam:"midterm",ch:1,n:7,stem:"下列有關金融商品之敘述中,哪些為正確?\nI. 央行發行國庫券主要為提升幣值\nII. 商業本票由企業發行,銀行擔保可流通\nIII. 可轉讓定期存單由銀行發行,到期前可轉讓",opts:["I、III","I、II","II、III","II","I、II、III"],ans:2,exp:"II、III 正確。I 錯誤:央行發行國庫券主要是為了調節市場資金、控制貨幣供給,並非提升匯率。II 商業本票由企業發行,經銀行擔保後可在貨幣市場流通。III 可轉讓定期存單(NCD)由銀行發行,具流通性,到期前可轉讓。"},
{exam:"midterm",ch:1,n:8,stem:"下列何者為到期日在一年以上的金融商品?",opts:["國庫券","銀行承兌匯票","商業本票","共同基金","可轉讓定期存單"],ans:3,exp:"(A)(B)(C)(E) 皆為一年以下的貨幣市場工具;共同基金通常無固定到期日(或長期投資),屬於資本市場工具。"},
{exam:"midterm",ch:1,n:9,stem:"下列何者是由投信公司向投資人募集資金,匯集成龐大金額,交由專業經理人買賣證券的金融商品?",opts:["海外存託憑證","商業本票","共同基金","銀行承兌匯票","股票選擇權"],ans:2,exp:"這是「共同基金」的標準定義——投信公司募集投資人資金,委由專業經理人操作,投資人按持有單位分享盈虧。"},
{exam:"midterm",ch:1,n:10,stem:"下列何者並不屬於衍生性金融商品?",opts:["海外存託憑證","期貨","金融交換","選擇權","以上皆是衍生性商品"],ans:0,exp:"海外存託憑證(DR)代表外國公司股票的所有權憑證,屬於現貨商品;期貨、選擇權、金融交換(SWAP)才是衍生性商品(其價值衍生自標的資產)。"},
{exam:"midterm",ch:1,n:11,stem:"財務管理所主張的公司目標為",opts:["公司利潤極大化","股東財富極大化","管理者財富極大化","每股盈餘極大化","員工福利極大化"],ans:1,exp:"現代財務管理以「股東財富極大化」為目標,因其考慮了現金流量、時間價值與風險,優於只看會計利潤的「利潤極大化」。"},
{exam:"midterm",ch:1,n:12,stem:"企業目標應具備哪些特性?\nI. 明確性 II. 多重性 III. 隱密性 IV. 具有衡量標準",opts:["I、II","II、III","I、IV","I、II、IV","II、III、IV"],ans:2,exp:"企業目標需具備明確性(避免模糊)與可衡量性(便於評估績效);目標若有多重(II)易造成衝突,隱密性(III)則無法傳達給員工執行。"},
{exam:"midterm",ch:1,n:13,stem:"在何種條件下,追求股價極大化可使股東財富極大?",opts:["公司獲利不佳受併購威脅","不解雇未犯錯員工","債權人受保障","資本市場具有效率","市價接近帳面價值"],ans:3,exp:"只有在「資本市場具效率」時,股價才能正確反映公司真實價值,此時追求股價極大化才等於股東財富極大化。"},
{exam:"midterm",ch:1,n:14,stem:"企業利用政治力量獲得特權,損害他人利益而獲得收益的行為稱為",opts:["企業倫理","積極性策略","代理人問題","多角化","尋租"],ans:4,exp:"「尋租(Rent-seeking)」指透過政治運作、遊說等非生產性活動獲取超額利益,而非透過生產或創新,屬於資源配置的扭曲。"},
{exam:"midterm",ch:1,n:15,stem:"股東與管理者之間因動機不同而產生了利益衝突,將會產生",opts:["代理人問題","從眾行為","信用風險","資本利得","尋租"],ans:0,exp:"「代理人問題(Agency Problem)」指委託人(股東)與代理人(管理者)目標不一致,代理人可能為自身利益損害委託人權益。"},
{exam:"midterm",ch:1,n:16,stem:"下列哪些屬於「代理人成本(Agency Costs)」?\nI. 監督成本 II. 尋租成本 III. 剩餘損失 IV. 破產成本",opts:["I、II","I、III","I、II、III","II、III","II、III、IV"],ans:1,exp:"代理成本包含三類:監督成本(股東監控管理者)、約束成本(管理者承諾的成本)、剩餘損失(無法完全消除的利益衝突造成的損失)。尋租與破產屬於其他類型成本。"},
{exam:"midterm",ch:1,n:17,stem:"公司讓管理者以低於市價購買本身股票,但必須持有一段時間才能買賣,此種方式稱為",opts:["紅利制度","委託書爭奪戰","特權消費","股票選擇權計劃","金融交換"],ans:3,exp:"「股票選擇權計劃(Stock Option Plan)」讓管理者以特定價格認購股票並設有閉鎖期,將管理者利益與股東財富綁定,是解決代理問題的常見工具。"},
{exam:"midterm",ch:1,n:18,stem:"何者不是用來解決股東和管理者之間代理問題的方式?",opts:["訂立管理獎勵計劃","直接股東干預","被開除的威脅","訂立債權限制條款","股票選擇權"],ans:3,exp:"「債權限制條款」是解決股東與「債權人」間代理問題的工具,並非解決股東與管理者間問題的方法。"},
{exam:"midterm",ch:1,n:19,stem:"下列何者對「企業倫理(Business Ethics)」的定義最正確?",opts:["不更換上下游廠商","誠實公正對待股東、客戶、員工及供應商","不惡意併購","提高慈善捐款金額","不以追求利潤為目標"],ans:1,exp:"企業倫理指企業對所有利害關係人(股東、客戶、員工、供應商等)秉持誠實、公正的原則,不限於單一行為。"},
{exam:"midterm",ch:1,n:20,stem:"下列有關「ESG」的敘述中,何者為正確?",opts:["ESG 僅帶來外部利益","ESG 重視氣體排放,溫度非主要目標","碳足跡是活動過程中直接和間接產生的排碳量","燃燒天然氣不計入排碳量","碳中和是指生產過程零排碳"],ans:2,exp:"(C) 正確,碳足跡涵蓋直接(自身生產)與間接(供應鏈、用電等)排碳。(A) ESG 也帶來品牌價值等內部利益。(B) 溫控(如 1.5°C 目標)是核心。(D) 天然氣燃燒會排 CO₂。(E) 碳中和指淨排放為零。"},
{exam:"midterm",ch:2,n:1,stem:"下列何者對「國際會計準則(IFRS)」的敘述最正確?",opts:["不須編製特定報表","採原則方式訂定,允許會計專業判斷","各國自行判斷編製","規範各項會計處理方法","不須編製現金流量表"],ans:1,exp:"IFRS 採「原則基礎(Principle-based)」,允許企業依專業判斷處理會計事項,有別於美國 GAAP 的「規則基礎(Rule-based)」。"},
{exam:"midterm",ch:2,n:2,stem:"下列哪一個科目並不屬於資產負債表?",opts:["基金與長期投資","專利與特許權","資本公積","保留盈餘","會計原則變更累積影響數"],ans:4,exp:"「會計原則變更累積影響數」屬於損益表(或權益變動表)中的調整項目,並非資產負債表科目。"},
{exam:"midterm",ch:2,n:3,stem:"綜合損益表係表示企業",opts:["特定時日的經營結果","特定時日的財務狀況","一段期間的經營成果","一段期間的財務狀況","一段期間的權益變化"],ans:2,exp:"綜合損益表為「期間報表」,反映企業某段期間的經營成果(收入-費用=損益)。資產負債表才是「時點報表」。"},
{exam:"midterm",ch:2,n:4,stem:"下列何種報表分為營業、投資、籌資三種活動?",opts:["資產負債表","損益表","權益變動表","現金流量表","以上皆是"],ans:3,exp:"現金流量表將現金流量分類為三大活動:營業活動、投資活動、籌資(融資)活動。"},
{exam:"midterm",ch:2,n:5,stem:"下列哪些屬於無形資產?\nI. 版權 II. 特許權 III. 租賃資產 IV. 專利權",opts:["I、II","I、IV","I、II、III","I、II、IV","I、II、III、IV"],ans:3,exp:"版權、特許權、專利權皆為無形資產;租賃資產屬於使用權資產(IFRS 16 後列於有形資產類)或不動產廠房及設備類。"},
{exam:"midterm",ch:2,n:6,stem:"公司未來可以抵減所得稅的金額應列為",opts:["資產","負債","股東權益","損失","利益"],ans:0,exp:"未來可抵減所得稅的金額為「遞延所得稅資產(Deferred Tax Asset)」,代表未來可少繳稅,屬於資產項目。"},
{exam:"midterm",ch:2,n:7,stem:"下列何者對「比率分析法」的敘述最正確?",opts:["以財報中兩個相關項目計算比率","分析不同公司成本佔銷售比率","列示各組成項目占總額百分比","比較不同年度相同項目","比較市價與帳面價值"],ans:0,exp:"比率分析法是將財報中兩個有意義的項目相除,得出比率以分析公司狀況。(C) 是共同比分析,(D) 是趨勢分析。"},
{exam:"midterm",ch:2,n:8,stem:"金融機構與債券投資人會以公司的何種資料計算,作為放款與投資的參考?",opts:["無形資產","企業主私人資產","董監事人數與持股","每年實體投資金額","財務比率"],ans:4,exp:"金融機構與債券投資人主要透過財務比率(如負債比、利息保障倍數、流動比率)評估公司償債能力與信用風險。"},
{exam:"midterm",ch:2,n:9,stem:"某證券分析師希望瞭解 A 公司銷貨的獲利狀況,應看下列哪一個比率?",opts:["資產報酬率","固定資產報酬率","純益率","股東權益報酬率","應收帳款週轉率"],ans:2,exp:"「純益率 = 稅後淨利 / 銷貨淨額」,直接衡量每元銷貨能產生多少利潤,反映銷貨獲利狀況。"},
{exam:"midterm",ch:2,n:10,stem:"下列有關「速動比率」之敘述中,哪些為正確?\nI. 速動比率 = 速動資產 / 流動負債\nII. 速動比率 ≤ 流動比率\nIII. 速動比率遠大於產業平均應考慮存貨過多\nIV. 短期金融資產增加、短期負債減少,速動比率上升",opts:["I、II","I、IV","I、II、III","I、II、IV","I、II、III、IV"],ans:3,exp:"I、II、IV 正確。III 錯誤:速動比率「遠大於」產業平均,代表速動資產(現金、應收)過多,而非存貨過多;若是「流動比率遠大於速動比率」才表示存貨過多。"},
{exam:"midterm",ch:2,n:11,stem:"下列有關存貨比率之敘述中,何者為正確?",opts:["存貨週轉率=銷貨成本/平均存貨;售貨日數=1/週轉率","存貨週轉率=銷貨成本/平均存貨;售貨日數=365/週轉率","存貨週轉率=銷貨成本/平均存貨;售貨日數=總資產/週轉率","存貨週轉率=總資產/平均存貨;售貨日數=1/週轉率","存貨週轉率=365/平均存貨;售貨日數=總資產/週轉率"],ans:1,exp:"標準公式:存貨週轉率 = 銷貨成本 / 平均存貨;平均售貨日數 = 365 / 存貨週轉率(代表存貨在倉庫平均停留天數)。"},
{exam:"midterm",ch:2,n:12,stem:"下列何者對「經濟附加價值(EVA)」之敘述最正確?",opts:["計算時應扣除利息費用","應考慮稅後資本成本","等於會計淨利扣除現金股利","應利用資產的市價計算","比較市價與帳面價值差異"],ans:1,exp:"EVA = 稅後營業淨利(NOPAT) - 投入資本 × 加權平均稅後資本成本(WACC)。重點是要扣除「全部資金成本」(包含權益成本),而非僅扣除利息。"},
{exam:"midterm",ch:2,n:13,stem:"下列何者對「市場附加價值(MVA)」之敘述為錯誤?",opts:["MVA = 股票價值扣除投資人提供資本的差額","MVA 是長期觀念非短期炒作","MVA 等於各年度 EVA 加總","增加流通股數不一定能增加 MVA","比較市價與帳面價值差異的方法"],ans:2,exp:"理論上 MVA 等於未來各期 EVA 的「現值加總」(折現),而非單純加總。其餘敘述皆正確。"},
{exam:"midterm",ch:2,n:14,stem:"史奴比公司速動比率 1.4,流動比率 2.0,流動負債 $400,000,現金及約當現金 $220,000,無預付費用。則「存貨」為何?",opts:["$240,000","$320,000","$340,000","$380,000","$560,000"],ans:0,exp:"流動資產 = 2.0 × 400,000 = 800,000\n速動資產 = 1.4 × 400,000 = 560,000\n存貨 = 800,000 - 560,000 = 240,000"},
{exam:"midterm",ch:2,n:15,stem:"凱蒂貓公司稅後淨利 $1,200,000,總資產週轉率 2.0,純益率 4%。「總資產報酬率(ROA)」為何?",opts:["2%","4%","6%","8%","10%"],ans:3,exp:"杜邦公式:ROA = 純益率 × 總資產週轉率 = 4% × 2.0 = 8%"},
{exam:"midterm",ch:2,n:16,stem:"維尼熊公司利息保障倍數(TIE)為 8,股東權益 $40,000 萬,利息費用 $450 萬,平均稅率 25%。「股東權益報酬率(ROE)」為何?",opts:["5.4%","5.9%","6.5%","7.4%","10.5%"],ans:1,exp:"EBIT = 8 × 450 = 3,600 萬\n稅前淨利 = 3,600 - 450 = 3,150 萬\n稅後淨利 = 3,150 × 0.75 = 2,362.5 萬\nROE = 2,362.5 / 40,000 ≈ 5.91%"},
{exam:"midterm",ch:2,n:17,stem:"美猴王公司今年初流通股數 2,000 萬股,7 月 1 日發放每股股票股利 $2(股數增加 20%),年底淨利 $5,000 萬,特別股股利 $680 萬。加權平均「每股盈餘」為何?",opts:["$1.68","$1.80","$1.92","$2.09","$2.16"],ans:1,exp:"股票股利需「追溯調整」自年初(全年 2,400 萬股)\n調整後流通股數 = 2,000 × 1.2 = 2,400 萬股\nEPS = (5,000 - 680) / 2,400 = $1.80"},
{exam:"midterm",ch:2,n:18,stem:"唐老鴨公司原料存貨持有 18 天,在製品 20 天,存貨週轉天數 62 天,應付帳款轉換 40 天。製成品存貨週轉率為多少次?(一年 360 天)",opts:["18 次","7.5 次","15 次","5 次","24 次"],ans:2,exp:"製成品存貨持有天數 = 62 - 18 - 20 = 24 天\n製成品週轉率 = 360 / 24 = 15 次"},
{exam:"midterm",ch:2,n:19,stem:"笑笑羊公司 ROE 15%,淨利 $360 萬,負債 $3,600 萬,銷售 $1.2 億。「總資產週轉率」為何?",opts:["2.0","2.5","3.0","3.5","4.0"],ans:0,exp:"股東權益 = 360 / 15% = 2,400 萬\n總資產 = 3,600 + 2,400 = 6,000 萬\n總資產週轉率 = 12,000 / 6,000 = 2.0"},
{exam:"midterm",ch:2,n:20,stem:"小馬王公司純益率 11.4%,資產週轉率 1.34,業主權益比率 0.67,則「ROE」為",opts:["10.23%","12.7%","5.7%","22.8%","33.2%"],ans:3,exp:"杜邦三因子:ROE = 純益率 × 資產週轉率 × 權益乘數\n權益乘數 = 1 / 0.67 ≈ 1.4925\nROE = 11.4% × 1.34 × 1.4925 ≈ 22.8%"},
{exam:"midterm",ch:2,n:21,stem:"灰太狼公司營收 10,000 萬,總負債 2,000 萬,純益率 10%,總資產週轉率 2。「ROE」為",opts:["20%","33%","60%","67%","75%"],ans:1,exp:"淨利 = 10,000 × 10% = 1,000 萬\n總資產 = 10,000 / 2 = 5,000 萬\n股東權益 = 5,000 - 2,000 = 3,000 萬\nROE = 1,000 / 3,000 ≈ 33.3%"},
{exam:"midterm",ch:2,n:22,stem:"頑皮豹公司每年銷售 $18,000,000,應收帳款週轉次數由 6 次降為 5 次,平均應收帳款應",opts:["增加 $600,000","減少 $600,000","增加 $180,000","減少 $180,000","無法確定"],ans:0,exp:"原應收帳款 = 18,000,000 / 6 = 3,000,000\n新應收帳款 = 18,000,000 / 5 = 3,600,000\n增加 = 600,000"},
{exam:"midterm",ch:2,n:23,stem:"甲公司將銀行短期借款轉為長期借款,將造成下列何項變動?",opts:["淨營運資金增加,流動比率上升","淨營運資金減少,流動比率上升","淨營運資金增加,速動比率下降","淨營運資金減少,速動比率下降","融資活動淨現金流入增加"],ans:0,exp:"短期借款轉長期借款,使流動負債減少。\n淨營運資金 = 流動資產 - 流動負債 → 淨營運資金增加\n流動比率 = 流動資產 / 流動負債 → 比率上升"},
{exam:"midterm",ch:2,n:24,stem:"折舊費用增加將使企業\nI. 稅後淨利增加 II. 稅後淨利減少\nIII. 資產現金流量增加 IV. 資產現金流量減少",opts:["I","II","I 與 III","II 與 III"],ans:3,exp:"折舊增加 → 稅後淨利減少(II)。但折舊是非現金費用,且具「節稅效果」,使應繳稅減少 → 現金流量增加(III)。"},
{exam:"midterm",ch:2,n:25,stem:"艾莎公司稅後淨利 $160,000,純益率 8%,毛利率 30%,所得稅率 20%。營業費用為?",opts:["750,000","400,000","366,667","500,000","423,333"],ans:1,exp:"銷售額 = 160,000 / 8% = 2,000,000\n毛利 = 2,000,000 × 30% = 600,000\n稅前淨利 = 160,000 / 0.8 = 200,000\n營業費用 = 600,000 - 200,000 = 400,000"},
{exam:"midterm",ch:2,n:26,stem:"下列敘述何者正確?",opts:["EVA 與 NI 最大差異是 NI 扣除權益成本,EVA 是扣除權益成本前的 NI","MVA 指過去一年管理部門增加的價值","MVA = 流通股數×股價 + 普通股帳面價值","EVA = EBIT×(1-T) - 投資人提供資本×稅後資金成本","EVA 並無考慮所得稅"],ans:3,exp:"(D) 正確,即 EVA = NOPAT − (投入資本 × WACC)。\n(A) 顛倒:NI 不扣權益成本,EVA 才扣。\n(B) MVA 是長期觀念。\n(C) MVA = 市值 - 投入資本。\n(E) EVA 用稅後 NOPAT 已考慮所得稅。"},
{exam:"midterm",ch:2,n:27,stem:"同光企業:總資產 $200,000,負債佔資產 65%,EBIT $25,000,負債利率 8%,所得稅率 40%。「ROE」為?",opts:["12.51%","13.14%","13.49%","13.80%","13.95%"],ans:0,exp:"負債 = 200,000 × 65% = 130,000;股東權益 = 70,000\n利息費用 = 130,000 × 8% = 10,400\n稅前淨利 = 25,000 - 10,400 = 14,600\n稅後淨利 = 14,600 × 0.6 = 8,760\nROE = 8,760 / 70,000 ≈ 12.51%"},
{exam:"midterm",ch:3,n:1,stem:"「現值」與「終值」的關係為",opts:["現值 = 1/終值","現值 = 終值/折現因子","現值 = 終值 × 折現因子","現值 = 終值 × (1+利率)^t","終值 = 現值/利率"],ans:2,exp:"現值 = 終值 × 折現因子 = 終值 × 1/(1+i)^t = 終值 / (1+i)^t"},
{exam:"midterm",ch:3,n:2,stem:"期初存入單一金額,以複利計算,則下列敘述何者最正確?",opts:["期數愈長,未來值愈小","利率愈高,未來值愈小","未來值與利率成正比、與期數無關","未來值與期數、利率成正比","未來值與期數成正比、與利率無關"],ans:3,exp:"FV = PV × (1+i)^n,未來值與期數(n)及利率(i)皆成正向關係。"},
{exam:"midterm",ch:3,n:3,stem:"一般年金的現值以 PMT × Σ[1/(1+i)^t] 表示,這種年金是何種模式?",opts:["期末模式","期中模式","期初模式","成長模式","等額模式"],ans:0,exp:"普通年金(Ordinary Annuity)假設付款發生在「期末」,即第 1 期、第 2 期...期末各支付一次。"},
{exam:"midterm",ch:3,n:4,stem:"張君每年存入金額,以複利計算,則每年存入金額與下列何者成正比?",opts:["期數","利率","退休金金額","以上皆是","以上皆非"],ans:2,exp:"目標退休金愈高,每年存入金額愈高(成正比);但期數愈多、利率愈高,每年存入愈少(成反比)。"},
{exam:"midterm",ch:3,n:5,stem:"下列哪些變數升高後,會增加年金的現值?\nI. 期數 II. 利率 III. 每期金額",opts:["I","I、II","I、III","II、III","I、II、III"],ans:2,exp:"期數↑現值↑(累積更多現金流);每期金額↑現值↑;但利率↑現值↓(折現更多)。"},
{exam:"midterm",ch:3,n:6,stem:"下列有關貨幣價值的敘述中,何者最正確?",opts:["計算次數愈多的存款,未來金額愈少","利率 10%、無限多次年金總額無限大","複利計算無限次,領回金額無限大","分期付款利率愈高,每期金額愈少","期初模式現值高於期末模式"],ans:4,exp:"期初年金較期末年金提早一期收到款項,故現值較高(期初現值 = 期末現值 × (1+i))。\n其餘:(A) 反之;(B) 永續年金現值有限 = PMT/i;(C) 連續複利在固定期間內仍有限;(D) 利率愈高,每期金額愈大。"},
{exam:"midterm",ch:3,n:7,stem:"下列有關「分期付款」的敘述中,何者最正確?",opts:["期數金額相同,期初攤還較有利","攤還的本金隨時間增加","攤還的利息隨時間增加","利率愈高,每期攤還愈少","期數愈長,每期攤還愈多"],ans:1,exp:"分期付款中,每期固定金額(本利和),隨時間經過利息減少、本金償還增加。"},
{exam:"midterm",ch:3,n:8,stem:"某人計劃 10 年內每年存 $24 萬,以複利計算,則下列何種方式未來值最高?",opts:["每月存 $2 萬","每兩月存 $4 萬","每季存 $6 萬","每半年存 $12 萬","每年存 $24 萬"],ans:0,exp:"計息次數愈多、每筆存款留存愈久,複利效果愈大,故每月存款的未來值最高。"},
{exam:"midterm",ch:3,n:9,stem:"每年金額 $20 萬、利率 2% 的「永續年金」現值為何?",opts:["$4 萬","$100 萬","$200 萬","$1,000 萬","無法計算"],ans:3,exp:"永續年金現值 = PMT / i = 20 萬 / 0.02 = 1,000 萬"},
{exam:"midterm",ch:3,n:10,stem:"趙先生每年年初存款 $30,000,第 5 年年底可領回 $180,000,則年利率為何?",opts:["6.12%","6.14%","6.16%","6.18%","6.20%"],ans:1,exp:"期初年金未來值:30,000 × FVIFA(i, 5) × (1+i) = 180,000\n試算 i = 6.14%:FVIFA ≈ 5.6473,5.6473 × 1.0614 ≈ 5.9942\n30,000 × 5.9942 ≈ 179,826 ≈ 180,000 ✓"},
{exam:"midterm",ch:3,n:11,stem:"錢小姐 12 年後退休,每年年底存款,年利率 7.5%,共可領回 $1,013,305,則每年存款為?",opts:["$51,163","$53,396","$55,000","$56,784","62,518"],ans:2,exp:"普通年金未來值:PMT × FVIFA(7.5%, 12) = 1,013,305\nFVIFA(7.5%, 12) ≈ 18.4242\nPMT = 1,013,305 / 18.4242 ≈ $55,000"},
{exam:"midterm",ch:3,n:12,stem:"孫太太 10 年期儲蓄保險,每年年初存款,利率 3%,第 10 年年底領回 $1,000,000,每年繳款為?",opts:["$84,690","$82,223","$80,000","$87,230","$88,020"],ans:0,exp:"期初年金未來值:PMT × FVIFA(3%, 10) × 1.03 = 1,000,000\nFVIFA(3%, 10) ≈ 11.4639\nPMT = 1,000,000 / (11.4639 × 1.03) ≈ $84,690"},
{exam:"midterm",ch:3,n:13,stem:"李經理每年年初存款 $50,000,第 5 年年底領回 $303,186,則年利率為?",opts:["5.0%","5.5%","6.0%","6.5%","6.8%"],ans:3,exp:"期初年金:50,000 × FVIFA(i, 5) × (1+i) = 303,186 → FVIFA × (1+i) = 6.06372\n試 6.5%:FVIFA(6.5%, 5) ≈ 5.6936;5.6936 × 1.065 ≈ 6.0637 ✓"},
{exam:"midterm",ch:3,n:14,stem:"周醫師今年初存 $10,000,名目年利率 5%,每半年複利一次,則第 2 年年底本利和為?",opts:["$11,000","$11,025","$11,038","$11,050","$11,120"],ans:2,exp:"半年計息,每期利率 2.5%,共 4 期\nFV = 10,000 × (1.025)^4 = 10,000 × 1.10381 ≈ $11,038"},
{exam:"midterm",ch:3,n:15,stem:"吳小弟 2 年前壓歲錢 $10,000 存定存(年利率 1.5%),去年又存 $10,000(年利率 1.2%),今年到期存款為?",opts:["$20,270","$20,392","$20,422","$20,452","$20,500"],ans:1,exp:"第一筆兩年期:10,000 × 1.015 × 1.012 ≈ 10,271.8\n第二筆一年期:10,000 × 1.012 = 10,120\n合計 ≈ $20,392"},
{exam:"midterm",ch:3,n:16,stem:"某人貸款 1,000 萬,年利率 3%,分 20 年每年年底平均攤還(普通年金)。每年應付金額?(20 年 3% 年金現值因子 14.8775)",opts:["63.4 萬","65.2 萬","67.2 萬","69.4 萬"],ans:2,exp:"PMT = 貸款金額 / PVIFA = 10,000,000 / 14.8775 ≈ 672,157 ≈ 67.2 萬"},
{exam:"midterm",ch:4,n:1,stem:"經由金融機構保證所發行的公司債稱為",opts:["可轉換債券","指數債券","零息債券","收益債券","擔保公司債"],ans:4,exp:"「擔保公司債」由第三方(通常是金融機構)提供保證,違約時由保證人代償,信用較高。"},
{exam:"midterm",ch:4,n:2,stem:"發行公司要具有盈餘才支付利息的債券稱為",opts:["可收回債券","指數債券","零息債券","收益債券","次級公司債"],ans:3,exp:"「收益債券(Income Bond)」只在公司有盈餘時才付息,類似特別股性質,常見於財務重整。"},
{exam:"midterm",ch:4,n:3,stem:"X 公司發行五年期債券,持有人兩年後可按比率轉換為「Y 公司」股票,此種債券稱為",opts:["收益債券","指數債券","本利分離債券","可轉換公司債","可交換公司債"],ans:4,exp:"轉換為「他公司」股票稱「可交換公司債(Exchangeable Bond)」;轉換為「發行公司本身」股票才叫可轉換公司債。"},
{exam:"midterm",ch:4,n:4,stem:"下列何種證券並不具有「選擇權」之性質?",opts:["可收回債券","賣權債券","浮動利率債券","可轉換債券","附認購權證公司債"],ans:2,exp:"浮動利率債券利率隨市場變動,不含選擇權性質;其他選項皆內嵌選擇權(收回權、賣回權、轉換權、認購權)。"},
{exam:"midterm",ch:4,n:5,stem:"公司發行債券明訂在一定時間後可變更為股票,此種債券為",opts:["可轉換債券","信用公司債","抵押債券","可收回債券","收益債券"],ans:0,exp:"「可轉換公司債(Convertible Bond)」賦予持有人按約定條件將債券轉為發行公司「自家股票」的權利。"},
{exam:"midterm",ch:4,n:6,stem:"下列事項中,何者最可能使流通在外債券之價格上揚?",opts:["大型企業發行大量債券","央行調高貼現率","風險變動使殖利率上升","債券評等普遍降級","國際油價與通貨膨脹下降"],ans:4,exp:"油價與通膨下降 → 市場利率下降 → 債券價格上漲(債券價格與利率反向)。其他選項皆使利率上升或風險增加。"},
{exam:"midterm",ch:4,n:7,stem:"K 汽車公司營運變差,其流通債券將有何變化?",opts:["違約風險升、殖利率降","違約風險升、殖利率升","違約風險升、殖利率不變","到期日風險升、殖利率升","流動性風險升、殖利率降"],ans:1,exp:"營運惡化 → 違約風險上升 → 投資人要求更高報酬補償 → 殖利率上升、價格下跌。"},
{exam:"midterm",ch:4,n:8,stem:"市場利率上升時,條件相同但到期日不同的債券價格如何變動?",opts:["皆下跌、長期債下跌較多","皆下跌、短期債下跌較多","皆上漲、長期債上漲較多","皆上漲、短期債上漲較多","短期漲、長期跌"],ans:0,exp:"利率上升 → 債券價格下跌。長期債券存續期間較長,對利率變動敏感度高,故跌幅較大(利率風險較高)。"},
{exam:"midterm",ch:4,n:9,stem:"J 公司債券評等由 A 升為 AA,殖利率與價格應",opts:["上升、上升","下降、下降","上升、下降","下降、上升","不變、上升"],ans:3,exp:"評等提升 → 違約風險降低 → 投資人要求殖利率下降 → 債券價格上升。"},
{exam:"midterm",ch:4,n:10,stem:"下列何者對債券評等有正面影響?",opts:["利息保障倍數升高","設立收回條款","發行次級公司債","增加退休金","公司租賃金額不受限制"],ans:0,exp:"利息保障倍數高代表公司清償利息能力強,有利於評等。其他選項都會降低債權人保障。"},
{exam:"midterm",ch:4,n:11,stem:"一般「投資等級」債券,在標準普爾(S&P)評等至少在何種等級以上?",opts:["A","BBB","BB","B"],ans:1,exp:"S&P 評等中,BBB 級(含)以上為投資等級,BB 級(含)以下為「投機等級」(垃圾債券)。"},
{exam:"midterm",ch:4,n:12,stem:"債券信用評等被「調降」時,違約風險貼水與市場價格通常會如何變動?",opts:["貼水上升,價格上升","貼水上升,價格下跌","貼水下降,價格上升","貼水下降,價格下跌"],ans:1,exp:"評等調降 → 違約風險增加 → 風險貼水上升、要求報酬上升 → 債券價格下跌。"},
{exam:"midterm",ch:4,n:13,stem:"持有股票即是該公司的",opts:["債權人","股東","董事","債務人","信託人"],ans:1,exp:"股票代表公司所有權,持有人即為股東,享有盈餘分配權與表決權。"},
{exam:"midterm",ch:4,n:14,stem:"福特 B 股由家族持有,占流通股數 15%,卻有 40% 投票權。此種股票稱為",opts:["追縱股","可轉換特別股","創始人股票","無面額股票","累積特別股"],ans:2,exp:"「創始人股票(Founder's Stock)」是公司創始家族保留控制權的特殊股票,投票權超過持股比例。"},
{exam:"midterm",ch:4,n:15,stem:"下列有關「戈登模式(Gordon Model)」之敘述中,哪些為正確?\nI. 假設股價具真值 II. 每期成長率固定\nIII. 每期股利固定 IV. 成長率小於股東必要報酬率",opts:["I、III","II、IV","I、II、IV","II、III、IV","I、II、III、IV"],ans:2,exp:"戈登成長模式:P₀ = D₁ / (k - g)\nI 假設市場效率,股價反映真值 ✓\nII 每期股利「成長率」g 固定 ✓\nIII 錯,每期股利並非固定,而是依 g 成長\nIV 必要 k > g,否則公式不收斂 ✓"},
{exam:"midterm",ch:4,n:16,stem:"「股利殖利率」(或股利率)係指",opts:["每股市價/每股股利","每股股利/每股市價","每股盈餘/每股市價","每股市價/每股盈餘"],ans:1,exp:"股利殖利率 = 每股股利 / 每股市價,衡量每元股票投資能領到多少股利。"},
{exam:"midterm",ch:4,n:17,stem:"使用「市場比較法」評估價格時,下列何者最正確?",opts:["不易找到性質類似的樣本公司","必須計算股東必要報酬率","必須由交易所同意","多角化公司較容易比價","盈餘為負數才有意義"],ans:0,exp:"市場比較法的最大限制是難以找到「完全可比較」的同質公司,因每家公司業務、規模、風險都有差異。多角化公司更難比價。"},
{exam:"midterm",ch:4,n:18,stem:"公司宣布「股票分割」(Stock Split) 時,對基本面與股東權益的影響,何者正確?",opts:["公司總資產增加","股東持股比例改變","股票面額按比例降低,總股東權益價值不變","公司必須撥出大量現金支付股東"],ans:2,exp:"股票分割只是「分割股票」,股數增加、面額按比例降低,總股東權益價值不變;不影響資產、不需動用現金、持股比例不變。"},
{exam:"midterm",ch:5,n:1,stem:"報酬率的標準差(Standard Deviation)是衡量公司的",opts:["營運風險","系統風險","非系統風險","股價波動程度","破產風險"],ans:3,exp:"標準差衡量報酬率分散程度,即股價(或報酬率)的「波動程度」,是總風險的衡量指標。"},
{exam:"midterm",ch:5,n:2,stem:"下列有關報酬率之敘述中,何者最正確?",opts:["判斷投資行為應以實際報酬率為基礎","幾何均數通常高估","期望報酬率以事前眼光評估","幾何均數不受交易費用影響","實際報酬率使用事前機率計算"],ans:2,exp:"期望報酬率(Expected Return)是基於各種可能情境的「事前」加權平均;實際報酬率才是「事後」結果。\n(B) 幾何均數通常「低估」(因考慮複利);(D) 受交易費用影響;(E) 實際報酬用事後資料。"},
{exam:"midterm",ch:5,n:3,stem:"下列有關風險與報酬率之敘述中,何者最正確?",opts:["期望風險與期望報酬率成反比","實際風險愈大,實際報酬率愈高","價格波動愈大,風險愈低","期望風險愈大、期望報酬率愈高","計算實際風險須先知機率"],ans:3,exp:"「高風險高報酬」原則,投資人承擔較高期望風險時,要求較高的期望報酬率(風險溢酬)。實際結果不一定符合此關係。"},
{exam:"midterm",ch:5,n:4,stem:"學者馬可維茲(H. Markowitz)的投資組合理論,主要論點是",opts:["系統風險的消除","分散破產風險","非系統風險的定義","透過積極管理提高報酬","分散投資組合風險"],ans:4,exp:"馬可維茲(1952)提出現代投資組合理論(MPT),核心是透過「分散投資」降低風險(主要是非系統風險),建立效率前緣。"},
{exam:"midterm",ch:5,n:5,stem:"投資組合內個別資產相關係數為 0 時,代表",opts:["無風險分散效果","有風險分散效果","風險分散達最佳","風險分散優於相關係數為 -1 之組合","投資組合不具風險"],ans:1,exp:"只要相關係數 < 1 都有分散效果;相關係數 = -1 才是最佳分散(可消除風險);相關係數 = 0 仍有分散效果但非最佳。"},
{exam:"midterm",ch:5,n:6,stem:"下列有關「變異係數(C.V.)」之敘述中,何者為正確?",opts:["衡量風險,C.V. = 標準差/平均報酬率","衡量期望報酬率,C.V. = 平均報酬率/標準差","衡量風險,C.V. = 平均報酬率/標準差","衡量期望報酬率,C.V. = 標準差/平均報酬率","衡量企業營運風險,為迴歸係數"],ans:0,exp:"變異係數 = 標準差 / 平均報酬率,衡量「每單位報酬所承擔的風險」,可用於不同報酬率水準的比較。"},
{exam:"midterm",ch:5,n:7,stem:"兩種證券所形成的組合風險為零,則相關係數應為",opts:["1","0.5","0","-0.5","-1"],ans:4,exp:"唯有相關係數為 -1(完全負相關)時,適當權重的組合可使風險完全消除(σp = 0)。"},
{exam:"midterm",ch:5,n:8,stem:"下列有關「證券組合」之敘述中,何者最正確?",opts:["個別證券風險愈低、關聯性愈高,愈能降低風險","個別證券系統風險愈低,愈能降低風險","個別證券彼此關聯性愈低,愈能降低風險","報酬率與關聯性愈高,愈能降低風險","個別證券非系統風險愈低,愈能降低風險"],ans:2,exp:"證券間「相關性愈低」(甚至為負),分散效果愈好,組合風險愈低。"},
{exam:"midterm",ch:5,n:9,stem:"下列有關「證券組合」之敘述中,何者最正確?",opts:["大量分散持股可消除所有市場風險","股票相關性愈高、組合風險愈低","持有 40 種股票後再增加無法降低風險","大量分散持股可消除所有個別(特定)風險"],ans:3,exp:"分散投資只能消除「非系統風險(特定風險)」,無法消除系統風險(市場風險)。一般認為持股 30~40 種已可消除大部分非系統風險,但仍可少量再降。"},
{exam:"midterm",ch:5,n:10,stem:"由個別證券報酬率與市場報酬率作簡單迴歸,所求得直線的斜率是",opts:["貝他(β)值","標準差","變異數","無風險利率","避險比率"],ans:0,exp:"特徵線(Characteristic Line)迴歸式:Ri = α + β·Rm + ε,斜率即「貝他係數 β」,衡量個別證券對市場報酬的敏感度。"},
{exam:"midterm",ch:5,n:11,stem:"衡量風險時,石油危機、世界大戰屬於",opts:["企業風險","財務風險","市場風險","流動性風險","到期日風險"],ans:2,exp:"石油危機、戰爭等系統性事件影響整個市場,屬於「市場風險(系統風險)」,無法透過分散投資消除。"},
{exam:"midterm",ch:5,n:12,stem:"下列事件中,哪一項不屬於「系統風險」?",opts:["央行調高貼現率","出口成長率下降","國際油價下跌","通貨膨脹率升高","公司撤換總經理"],ans:4,exp:"「公司撤換總經理」屬於個別公司事件,影響有限,屬於「非系統風險」。其他皆為總體經濟事件。"},
{exam:"midterm",ch:5,n:13,stem:"下列何種投資組合的非系統風險較小?",opts:["個別產業股票型基金","股價指數基金","個別股票","成長型股票基金","無法比較"],ans:1,exp:"股價指數基金涵蓋市場上多種股票,分散程度最高,非系統風險最小,接近僅剩系統風險。"},
{exam:"midterm",ch:5,n:14,stem:"基金經理人預期未來股市上漲,應採何項行動?",opts:["調低持股比率","集中持有傳統產業","調高投資組合的貝他係數","分散投資","買入非股票資產"],ans:2,exp:"β 值衡量對市場波動的敏感度。預期市場上漲時,提高 β 值(買進高 β 股票)可放大上漲報酬。"},
{exam:"midterm",ch:5,n:15,stem:"下列有關「資本資產評價模式(CAPM)」的敘述中,何者最正確?",opts:["目的為估計股價水準","β 估計值是公司報酬率除以無風險利率","假設投資人為風險中立者","以市場報酬率與無風險利率之差作為風險溢酬","β 值不會隨時間改變"],ans:3,exp:"CAPM:E(Ri) = Rf + βi × (Rm - Rf);市場風險溢酬 = Rm - Rf。\n(A) 估計必要報酬率;(B) β 是迴歸斜率;(C) 假設風險「趨避」;(E) β 會隨時間變動。"},
{exam:"midterm",ch:5,n:16,stem:"預期市場報酬 10%,無風險利率 2%。X 股票:預期 14%、β=1.2;Y 股票:預期 16%、β=1.8。理論上應買入哪一種股票?",opts:["X,具 1.2% 預期超額報酬","X,具 2.4% 預期超額報酬","Y,具 16% 預期報酬","Y,具 0.4% 預期超額報酬","皆不應買入"],ans:1,exp:"用 CAPM 計算必要報酬率:\nX 必要報酬 = 2% + 1.2 × 8% = 11.6%;預期 14% > 11.6%,超額 = 2.4%(被低估,應買進)\nY 必要報酬 = 2% + 1.8 × 8% = 16.4%;預期 16% < 16.4%,超額 = -0.4%(被高估)"},
{exam:"midterm",ch:5,n:17,stem:"關於股票預期報酬率之敘述,下列何者正確?",opts:["預期報酬率與「個別風險」呈正比","貝他係數愈大,預期報酬率愈高","市場風險貼水下降,所有股票預期報酬率上升","報酬率僅取決於過往盈餘表現"],ans:1,exp:"根據 CAPM,預期報酬率 = Rf + β × 風險溢酬,β 愈大則預期報酬率愈高。\n(A) 個別風險(非系統)可分散,不影響預期報酬;(C) 風險貼水下降使預期報酬率下降;(D) 預期報酬看未來而非過往。"},
{exam:"midterm",ch:6,n:1,stem:"下列有關「還本期間」與「折現還本期間」的敘述中,何者為正確?",opts:["兩者皆考慮貨幣時間價值","折現率為正時,還本期間時間較短","折現還本期間計算較容易","折現還本期間可表現規模、還本期間則否","兩者愈長愈好"],ans:1,exp:"還本期間不考慮折現,故累積金額較快達標,時間較短;折現還本期間因現值較小,須更久才能回收。\n(A) 還本期間不考慮時間價值;(C) 折現還本較複雜;(D) 兩者皆無法表現規模;(E) 愈短愈好。"},
{exam:"midterm",ch:6,n:2,stem:"下列何種變化會減少投資案的「淨現值(NPV)」?",opts:["資本成本下降","期初投入下降","營運成本下降","期末資產售價更高","工程期數拉長"],ans:4,exp:"期數拉長 → 現金流入延後 → 折現後現值降低 → NPV 下降。其他選項都會增加 NPV。"},
{exam:"midterm",ch:6,n:3,stem:"投資案「淨現值(NPV)」等於 0 的折現率為",opts:["獲利指數(PI)","內部報酬率(IRR)","資本成本","平均會計報酬率(AAR)","修正後內部報酬率(MIRR)"],ans:1,exp:"「內部報酬率(IRR)」的定義:使 NPV = 0 的折現率。"},
{exam:"midterm",ch:6,n:4,stem:"假如投資案的資本成本超過「IRR」,則該投資案",opts:["NPV<0","NPV>0","MIRR>IRR","IRR=0","折現還本期間=0"],ans:0,exp:"當折現率(資本成本)>IRR 時,NPV < 0,投資案應拒絕。"},
{exam:"midterm",ch:6,n:5,stem:"下列哪些是「IRR」可能會產生的問題?\nI. 多重解 II. 錯失最有利的投資案 III. 未考慮貨幣時間價值",opts:["I","I、II","I、III","II、III","I、II、III"],ans:1,exp:"I 正確,當現金流量正負交錯,可能有多重 IRR;II 正確,互斥方案下 IRR 與 NPV 法可能衝突,選錯方案;III 錯,IRR 已考慮時間價值。"},
{exam:"midterm",ch:6,n:6,stem:"「修正後 IRR(MIRR)」是針對 IRR 的哪一個項目作修正?",opts:["現金流量估計不佳","折現率每期相等","未考慮折現還本","NPV=0 過於保守","各期淨現金流入的再投資報酬率假設不合理"],ans:4,exp:"IRR 假設中間現金流量以 IRR 再投資,常與實際不符。MIRR 改以「資本成本」作為再投資報酬率,較合理。"},
{exam:"midterm",ch:6,n:7,stem:"紅隼公司折現率為正,有一投資案期初投 200 百萬,4 年每年淨賺 50 百萬,何者描述正確?",opts:["NPV 為負","NPV 為零","PI 為零","IRR 會超過資本成本","折現還本期間少於 4 年"],ans:0,exp:"未折現總流入 = 50 × 4 = 200(剛好回本),折現後現值 < 200,故 NPV < 0,IRR < 折現率。"},
{exam:"midterm",ch:6,n:8,stem:"下列哪些數據愈高,代表投資案愈有利?\nI. 折現還本期間 II. IRR III. NPV IV. 資本成本",opts:["I、II","I、III","II、III","I、II、III","I、II、III、IV"],ans:2,exp:"IRR、NPV 愈高愈有利;折現還本期間「愈短」愈好;資本成本(折現率)上升會降低 NPV,愈低愈好。"},
{exam:"midterm",ch:6,n:9,stem:"下列有關「資本預算」的方法中,何者並未考慮貨幣時間價值?",opts:["折現還本期間","IRR","NPV","平均會計報酬率(AAR)","MIRR"],ans:3,exp:"AAR 是用會計利潤除以平均投資金額,完全不涉及折現,故未考慮時間價值。"},
{exam:"midterm",ch:6,n:10,stem:"四個投資案皆風險相近、資本成本 12%。甲:NPV 為負接近零;乙:12% 折現 NPV 為零;丙:14% 折現 NPV 為零;丁:資本成本超過 IRR。應選何者?",opts:["甲","乙","丙","丁","四個皆不選"],ans:2,exp:"甲:NPV<0,拒絕\n乙:IRR=12%=資本成本,NPV=0,無利可圖\n丙:IRR=14% > 資本成本 12%,NPV>0 ✓\n丁:IRR<資本成本,NPV<0,拒絕"},
{exam:"midterm",ch:6,n:11,stem:"關於 NPV 與 IRR 法之比較,下列敘述何者正確?",opts:["NPV>0 時,IRR 必小於資金成本","NPV 法假設現金流量以 IRR 再投資","互斥方案應優先選擇 IRR 較高者","NPV 法考慮貨幣時間價值,且符合股東財富極大化目標"],ans:3,exp:"(A) NPV>0 時 IRR > 資金成本(顛倒);(B) NPV 法假設以「資本成本」再投資,IRR 法才是以 IRR 再投資;(C) 互斥方案應優先選擇 NPV 較高者;(D) NPV 直接顯示股東財富增加金額。"},
{exam:"midterm",ch:7,n:1,stem:"「資本預算」所要估計的是何種金額?",opts:["稅後淨利","利息及稅前純益","現金流量總額","現金流量增額","銷售金額增額"],ans:3,exp:"資本預算評估「投資案因執行所額外產生」的現金流量(增額),而非總額或會計利潤。"},
{exam:"midterm",ch:7,n:2,stem:"下列何者不應影響投資案的現金流量?",opts:["低估期初評估費用","機器安裝費用高於帳面殘值","高估期末資產市值","低估壞帳金額","低估淨營運資金"],ans:0,exp:"期初的「評估費用」屬於沉沒成本(無論投資與否都已發生),不應計入投資案現金流量。"},
{exam:"midterm",ch:7,n:3,stem:"下列有關評估投資案的敘述中,何者最正確?",opts:["攤銷費用不計入","僅考慮損益表科目","期末處分資產應以稅後現金流量計算","使用既有資產不需另計","增加的淨營運資金視為現金流入"],ans:2,exp:"處分資產若有資本利得需繳稅,應以「稅後」金額計算現金流量。\n(A) 攤銷有節稅效果應計入;(B) 也須考慮資產負債表(營運資金);(D) 既有資產有機會成本;(E) 增加淨營運資金為現金「流出」。"},
{exam:"midterm",ch:7,n:4,stem:"從事「資本預算」時,下列何者應視為現金流量增加?",opts:["淨營運資金增加","折舊費用減少","研發費用增加","處分公司長期投資","購買不動產"],ans:3,exp:"處分長期投資 → 收回現金 → 視為現金流入。\n(A) 占用資金,流出;(B) 折舊減少使稅增加,現金流出;(C) 費用流出;(E) 投資支出流出。"},
{exam:"midterm",ch:7,n:5,stem:"下列何者對公司「資本成本(Cost of Capital)」之敘述最正確?",opts:["以金額衡量,應為正值","以金額衡量,可正可負","以百分比衡量,應為正值","以百分比衡量,可正可負","是營運資金除以銷售額"],ans:2,exp:"資本成本以「百分比(報酬率)」表示,且必為正值(投資人提供資金必要求報酬)。"},
{exam:"midterm",ch:7,n:6,stem:"下列有關「加權平均資本成本(WACC)」的敘述中,何者最正確?",opts:["固定與變動成本所計算的加權成本","公司債務利率與股權報酬率所計算的加權成本","業內與業外成本","流動與固定資產成本","利率、風險溢酬、總資產報酬率"],ans:1,exp:"WACC = (D/V) × Kd × (1-T) + (E/V) × Ke,以負債成本(債務利率)與權益成本(股權必要報酬)按市值權重加權。"},
{exam:"midterm",ch:7,n:7,stem:"下列何者可提高投資案的「淨現值」?",opts:["機會成本升高","沉沒成本變小","借款利率升高","工程延誤,期數拉長","期初淨營運資金減少"],ans:4,exp:"期初淨營運資金減少 → 期初現金流出減少 → NPV 提高。\n(A) 流出增加;(B) 沉沒成本不影響評估;(C) 折現率升高,NPV 降;(D) 流入延後,NPV 降。"},
{exam:"midterm",ch:7,n:8,stem:"比較兩個期數不同的擴充型計劃時,應選擇下列何者?",opts:["NPV 較大者","EAA 較高者","稅後淨利較高者","IRR 較高者","折舊費用較高者"],ans:1,exp:"期數不同的互斥方案,應使用「年金約當值法(EAA, Equivalent Annual Annuity)」將 NPV 換算成年金,再比較。EAA 較高者較佳。"},
{exam:"midterm",ch:7,n:9,stem:"「敏感度分析」的主要目的是",opts:["追查執行責任","調查季節性變動對 NPV 影響","稽核現金流量差異","重要變數對淨現值的影響","分析市場佔有率影響"],ans:3,exp:"敏感度分析:在其他變數不變下,改變某一變數(如售價、銷量)觀察 NPV 變化,找出關鍵風險變數。"},
{exam:"midterm",ch:7,n:10,stem:"下列何種特性對投資案有利?",opts:["公司具知名品牌","市場已充斥類似產品","議價能力低","成本較高","產品具季節性"],ans:0,exp:"知名品牌帶來定價力與顧客忠誠度,有利於投資案成功。其他選項皆是不利因素。"},
{exam:"midterm",ch:7,n:11,stem:"「資本配額(Capital Rationing)」可以避免何種問題?",opts:["專業不足","顧客滿意度低","過度投資","侵蝕本業","產品季節性"],ans:2,exp:"資本配額限制投資總額,可避免管理者為追求規模而「過度投資」於 NPV 較低甚至為負的方案。"},
{exam:"midterm",ch:7,n:12,stem:"下列有關資本預算的做法中,何者並不適當?",opts:["將投資分為改善、維持、獲利型態","與其他公司合資分擔風險","大型投資案以專案處理","利用責任中心制度","評估時不應考慮撤資的可能性"],ans:4,exp:"評估投資計畫時應考慮各種可能,包括「撤資選擇權(Abandonment Option)」,否則會低估方案彈性與價值。"},
{exam:"midterm",ch:7,n:13,stem:"下列哪些因素有利於企業投資案的成功?\nI. 強力行銷通路 II. 市場已有多種類似商品\nIII. 知名品牌 IV. 公司資本充裕造成進入障礙",opts:["I、II","I、III","I、III、IV","II、IV","I、II、III、IV"],ans:2,exp:"I、III、IV 皆是競爭優勢;II 反而是不利因素(市場已飽和、競爭激烈)。"},
{exam:"midterm",ch:7,n:14,stem:"「敏感度分析」(Sensitivity Analysis) 的主要目的是?",opts:["找出計畫在各種經濟情境下的加權平均報酬率","衡量某一特定變數改變時對 NPV 的影響","評估公司破產機率","決定計畫的最適資本結構"],ans:1,exp:"敏感度分析「一次只變動一個變數」(其他不變),觀察其對 NPV 的影響程度,找出最關鍵變數。"}
];

// ---------- 第 8 章 資本結構 ----------
{exam:"final",ch:8,n:1,stem:"下列何者最能代表公司的「資本結構」?",opts:["負債比率","管理者、法人及散戶之持股比率","銀行借款金額除以發行債券金額之比率","資本支出佔資產的比率","來自營運活動的現金流量比率"],ans:0,exp:"資本結構指公司「長期資金」中負債與權益的組成比例,通常以負債比率(負債/資產)衡量。(B) 是股權結構;(C)(D)(E) 與資金來源組成無關。"},
{exam:"final",ch:8,n:2,stem:"就一般狀況而言,下列哪一個公司變數愈高(多)時,公司的負債比率會較低?",opts:["無形資產","營運之固定成本","平均稅率","財務彈性","不動產"],ans:3,exp:"公司若重視「財務彈性」,會保留舉債能力以備未來投資或不時之需,故傾向維持較低的負債比率。其餘變數(無形資產除外)多會提高舉債意願。"},
{exam:"final",ch:8,n:3,stem:"就一般狀況而言,下列有關公司性質與負債比率之敘述中,何者最正確?",opts:["公司的無形資產愈多,通常會有較高的負債比率","公司的固定成本愈高,通常會有較高的負債比率","獲利高、現金股利低的公司之負債比率較低","風險較高的高科技產業應採用高負債比率的策略","公司的平均稅率愈低,通常會有較高的負債比率"],ans:2,exp:"獲利高、現金股利低 → 內部保留盈餘多,依融資順位理論優先用內部資金,故負債比率較低。(A) 無形資產多不利舉債;(B) 固定成本高營運風險大,不宜再加財務風險;(D) 高風險產業應低負債;(E) 稅率低,稅盾利益小,舉債意願低。"},
{exam:"final",ch:8,n:4,stem:"正常情況下,下列哪些狀況會使公司傾向舉債?\nI. 管理者希望保留融資彈性 II. 股市出現多頭行情 III. 借款利率很低 IV. 具有許多的不動產",opts:["I、II","I、II、III","II、III","I、III、IV","III、IV"],ans:4,exp:"III 借款利率低 → 舉債成本低,傾向舉債;IV 不動產多 → 可作擔保品,易取得借款。I 保留融資彈性反而會少舉債;II 多頭行情下發行新股較有利,傾向權益融資。"},
{exam:"final",ch:8,n:5,stem:"正常情況下,獲利良好的上市櫃公司辦理「減資(Capital Reduction)」,會出現何種狀況?\nI. 負債比率下降 II. 負債比率上升 III. 宣告時股價上漲",opts:["I、III","II、III","I、II","II、IV","以上皆不會發生"],ans:1,exp:"減資使股本(股東權益)減少 → 負債比率(負債/總資產)上升(II)。獲利良好公司減資常被解讀為將多餘現金還給股東、提高每股價值,屬正面訊號,宣告時股價上漲(III)。"},
{exam:"final",ch:8,n:6,stem:"下列何者認為企業會有最適資本結構?",opts:["資本結構無關假說(Capital Irrelevance)","資訊不對稱假說(Information Asymmetry)","信號假說(Signaling)","權衡理論(Trade-off)","融資順位理論(Pecking Order)"],ans:3,exp:"權衡理論主張公司在「舉債稅盾利益」與「財務困難成本」之間權衡,存在使公司價值最大的「最適負債比率」。MM 無關假說則認為資本結構不影響公司價值。"},
{exam:"final",ch:8,n:7,stem:"資本結構的「權衡理論(The Trade-off Theory)」中,並不包括下列何者?",opts:["稅盾效果","破產成本","市場信號","代理人成本","以上皆包括"],ans:2,exp:"權衡理論權衡的是稅盾效果(舉債好處)與財務困難成本(破產成本、代理成本等壞處)。「市場信號」屬於信號理論的概念,不是權衡理論的組成要素。"},
{exam:"final",ch:8,n:8,stem:"哪一個理論(或假說)主張:「公司對資金的偏好依序為內部資金、舉債及發行新股」?",opts:["一鳥在手假說","代理人理論","權衡理論","融資順位理論","發射信號假說"],ans:3,exp:"融資順位理論(Pecking Order Theory)因資訊不對稱,公司籌資偏好為:內部資金(保留盈餘)→ 舉債 → 最後才發行新股。"},
{exam:"final",ch:8,n:9,stem:"按照「融資順位理論(Pecking Order Theory)」,下列何者最正確?",opts:["偏好舉債而非發行新股,以降低融資成本","偏好舉債而非使用內部現金,因為舉債可以享有稅盾效果","偏好發行新股而非舉債,因為易陷入財務危機","偏好發行新股而非舉債,以改善每股盈餘","舉債與發行新股無差異"],ans:0,exp:"融資順位理論下,發行新股的資訊不對稱成本最高(易被市場解讀為股價被高估),故公司偏好舉債而非發行新股,以降低融資成本。內部資金又優先於舉債。"},
{exam:"final",ch:8,n:10,stem:"下列敘述中,何者對資本結構的描述最正確?",opts:["市場的期望破產成本愈低,企業舉債意願愈低","政府及銀行援助財務困難公司的意願愈高,企業的舉債意願愈低","MM 的資本結構無關假說加上公司所得稅之後,公司負債比率應為 100%","MM 認為,無論考慮公司所得稅與否,都不會影響公司的價值","MM 認為,負債成本高於發行新股"],ans:2,exp:"MM 加入公司所得稅後,舉債產生的利息稅盾會持續增加公司價值,理論上負債比率應達 100%。(A)(B) 破產成本低、有外援 → 舉債意願「上升」;(D) 加入公司稅後資本結構會影響公司價值;(E) 負債成本低於權益成本。"},
{exam:"final",ch:8,n:11,stem:"下列有關「資本結構」理論的敘述中,何者最正確?",opts:["每股盈餘極大化可使公司維持最適資本結構","在完美市場、有所得稅的情況下,公司不應舉債","在完美市場、有所得稅的情況下,MM 認為稅盾無法增加公司價值","「信號理論」隱含公司應保留舉債能力","「融資順位理論」主張現金流量愈多,公司負債比率也會愈高"],ans:3,exp:"信號理論下,公司應保留舉債能力,以便日後有好的投資機會時能迅速籌資,並避免被迫發行新股傳遞負面訊號。(A) 最適資本結構以公司價值極大化為準;(B)(C) 有公司稅時稅盾會增加價值,應適度舉債;(E) 融資順位理論下現金流量愈多,愈用內部資金,負債比率愈低。"},
{exam:"final",ch:8,n:12,stem:"根據莫迪格利安尼與米勒(MM)無稅模型,在不考慮公司債務與個人稅的情況下,下列敘述何者正確?",opts:["負債比例愈高,公司的加權平均資金成本(WACC)愈低","公司的價值與其資本結構無關","負債比例愈高,公司價值愈高","權益資金成本會隨負債比例增加而下降"],ans:1,exp:"MM 無稅模型(命題 I):在完美市場且無稅下,公司價值由其資產的獲利能力決定,與資本結構(負債權益比)無關。(A) WACC 維持不變;(C) 公司價值不變;(D) 權益成本會隨負債增加而「上升」(命題 II)。"},
{exam:"final",ch:8,n:13,stem:"企業發生「財務困難」時,債權人通常會要求公司將資產移轉交付給",opts:["證券主管機關","股務代理機構","信託人","法院","律師"],ans:2,exp:"企業財務困難進行債務重整或清算時,常將資產移轉給「信託人(受託人)」保管與處分,以保障債權人權益。"},
{exam:"final",ch:8,n:14,stem:"企業發生「財務困難」時,可提出完整的「重整計劃」,說明未來的償債計劃,向 ___ 提出申請,獲准後由 ___ 負責重整、繼續公司的經營。",opts:["目的事業主管機關、債權人","目的事業主管機關、重整人","信託人、重整監督人","法院、重整人","法院、原董事會"],ans:3,exp:"公司重整須向「法院」聲請,經法院裁定准許後,由法院選派的「重整人」負責執行重整計劃並繼續經營公司。"},
{exam:"final",ch:8,n:15,stem:"公司進入破產清算程序,則下列項目的賠償先後順序(由高至低)應為何?\nI. 破產前的員工薪資 II. 信用借款的債權人 III. 應付稅負",opts:["I、II、III","I、III、II","II、I、III","II、III、I","III、II、I"],ans:1,exp:"清算受償順序:具優先權的員工薪資 → 稅捐(優先債權)→ 一般無擔保債權人(信用借款)。故順序為 I → III → II。"},
{exam:"final",ch:8,n:16,stem:"下列何者為破產的「間接成本」?",opts:["信託費用","破產訴訟之律師費用","以低於市價出售資產之折讓","會計師處理破產費用","顧客不願購買公司產品"],ans:4,exp:"間接成本指因財務困難造成的營運損失,如顧客流失、供應商不願供貨、優秀員工離職等。(A)(B)(C)(D) 屬於可直接認列的直接成本(訴訟、行政、賤賣資產損失)。"},
{exam:"final",ch:8,n:17,stem:"當企業面臨嚴重的財務困難風險時,股東可能會拒絕投資一個「淨現值為正(NPV>0)」的計畫,理由是該計畫產生的收益大部分將歸於債權人。這種現象稱之為:",opts:["過度投資問題(Overinvestment Problem)","投資不足問題(Underinvestment Problem)","自由現金流量問題(Free Cash Flow Problem)","稅盾利益問題(Tax Shield Problem)"],ans:1,exp:"這是「投資不足問題(Underinvestment / Debt Overhang)」:財務困難時,好計畫的收益多被債權人取走,股東不願出資,導致放棄 NPV>0 的計畫。"},
{exam:"final",ch:8,n:18,stem:"根據資本結構的權衡理論(Trade-off Theory),當公司逐步增加負債比例時,關於財務困難成本現值的敘述,下列何者正確?",opts:["財務困難成本現值會隨著負債增加而線性下降","財務困難成本現值會隨著負債增加而加速上升","財務困難成本現值與負債比例無關","財務困難成本現值只會在公司負債比率達到 100% 時突然出現"],ans:1,exp:"權衡理論下,負債愈高,陷入財務困難的機率與嚴重程度愈高,財務困難成本現值會「加速上升」(非線性遞增),最終抵銷稅盾利益,形成最適資本結構。"},

// ---------- 第 9 章 股利 ----------
{exam:"final",ch:9,n:1,stem:"買入上市櫃公司股票,在前一天就可以領取股息,但當天卻沒有,這個交易日稱為",opts:["股利公告日","除息日","最後過戶日","過戶基準日","到期日"],ans:1,exp:"「除息日」當天(含)之後買進的人不能領取本次股息;除息日「前一天」買進並持有的人才有權領息。"},
{exam:"final",ch:9,n:2,stem:"企業的股利是依照何時之股東名冊發放給股東?",opts:["公告日","除息(權)日","最後過戶日","過戶基準日","會計年度最後一日"],ans:3,exp:"公司以「過戶基準日」當天股東名冊上記載的股東為發放對象,凡基準日列名者即可領取股利。"},
{exam:"final",ch:9,n:3,stem:"下列何者與發放股票股利的效果最接近?",opts:["收購其他公司","股票分割","現金增資","減資","買回庫藏股"],ans:1,exp:"股票股利與股票分割效果相近:都使流通股數增加、每股價值(每股淨值、市價)按比例下降,而股東權益總額與持股比例不變。"},
{exam:"final",ch:9,n:4,stem:"下列有關美國證券市場的敘述中,哪些為正確?\nI. 多數企業每季發放股利 II. 以發放股票股利為主\nIII.「特別股利」是由特許行業所發放 IV. 可實施「股票分割」",opts:["I、II","I、III、IV","I、IV","II、IV","II、III、IV"],ans:2,exp:"I 美國企業多採每季發放現金股利;IV 美國公司可實施股票分割。II 錯,美國以「現金股利」為主;III 錯,特別股利(Special Dividends)是公司有額外盈餘時不定期發放的一次性股利,與特許行業無關。"},
{exam:"final",ch:9,n:5,stem:"下列有關台灣企業發放股利之敘述中,哪些為正確?\nI. 最後過戶日之前(含)完成過戶的股東才可領取股利\nII.「無償配股」是指發行股票股利\nIII. 發行現金股利之價格調整為「除權」\nIV. 公司常以資本公積轉增資發放現金股利",opts:["I、II","I、III","I、II、III","II、III","II、III、IV"],ans:0,exp:"I、II 正確。III 錯,發行「現金股利」的價格調整為「除息」,發股票股利才是「除權」。IV 錯,資本公積轉增資是發放「股票股利」,不是現金股利。"},
{exam:"final",ch:9,n:6,stem:"下列何者對台灣股利收入稅負之敘述為正確?",opts:["投資人由上櫃公司所獲之股利收入免稅","股票股利之所得額是以當年度平均市價計算","投資人由高科技事業所獲之現金股利免稅","在實施「兩稅合一」後,投資人股利收入需併入綜合所得額計算","由保留盈餘轉增資之股票股利需加課 10% 的稅負"],ans:3,exp:"兩稅合一制下,股利屬於股東的營利所得,需併入綜合所得總額課稅(或採分開計稅)。(A)(C) 股利收入並非免稅;(B) 股票股利以「面額」計算所得;(E) 保留盈餘轉增資的股票股利不另加課 10%(未分配盈餘加徵稅是針對未分配的部分)。"},
{exam:"final",ch:9,n:7,stem:"企業發放「股票股利」之後,下列哪些科目將會增加?\nI. 流通在外股數 II. 股本 III. 每股淨值 IV. 淨值總額",opts:["I","I、II","I、II、IV","II、IV","I、II、III、IV"],ans:1,exp:"發股票股利是將保留盈餘轉入股本:流通股數增加(I)、股本增加(II)。但股東權益「總額」不變(IV 不變),每股淨值因股數增加而「下降」(III 不變)。"},
{exam:"final",ch:9,n:8,stem:"關於「股票股利(Stock Dividends)」之發放,下列敘述何者正確?",opts:["會導致公司的現金資產大幅減少","會減少公司的負債總額","僅為股東權益科目間的轉移,不影響股東權益總額","會導致每股淨值增加"],ans:2,exp:"股票股利只是把「保留盈餘」轉為「股本」,屬於股東權益科目內部的移轉,不影響股東權益總額,也不動用現金。(A) 不減現金;(B) 與負債無關;(D) 每股淨值因股數增加而下降。"},
{exam:"final",ch:9,n:9,stem:"若稅法規定「現金股利所得稅率」高於「資本利得稅率」,且公司增加現金股利發放,根據稅賦偏好理論,這對公司股價有何影響?",opts:["股價應會上升,因為投資人喜歡領現","股價應會下跌,因為投資人稅後收益減少","股價維持不變,因為稅率不影響公司價值","股價變動僅與投資計畫有關,與稅率無關"],ans:1,exp:"稅賦偏好理論:當股利稅率高於資本利得稅率時,投資人偏好公司少發股利、多保留盈餘以取得資本利得。公司若增加現金股利,投資人稅後收益減少,股價會下跌。"},
{exam:"final",ch:9,n:10,stem:"下列何者是「一鳥在手(The Bird in the Hand)」的股利論述?",opts:["公司應保留足夠的資金在手上,盡量少發股利","股利會降低公司價值,故應保留現金在手","投資人偏好現金,發放現金股利可降低資本成本","公司應發放股票股利,以便增加股本","法人偏好現金,故應盡力發放現金股利"],ans:2,exp:"一鳥在手理論主張:現金股利確定性高,投資人偏好「現在拿到的現金」勝過「未來不確定的資本利得」,故多發現金股利可降低股東要求報酬率(資本成本),提升公司價值。"},
{exam:"final",ch:9,n:11,stem:"低稅率投資人偏好公司多發現金股利,高稅率投資人則希望公司少發放現金股利,此種現象是屬於下列何者?",opts:["委託人(顧客)效果","剩餘股利政策","代理人成本","股利信號理論","一鳥在手理論"],ans:0,exp:"「顧客效果(Clientele Effect)」:不同稅率、不同偏好的投資人會聚集到股利政策符合其需求的公司,形成各自的「客戶群」。"},
{exam:"final",ch:9,n:12,stem:"下列哪些可以解釋高額現金股利減少「代理人成本」之論點?\nI. 除息時價格下跌較少 II. 內部人會增加持股比率\nIII. 可以減少管理者不必要的花費 IV. 資本市場可以監督管理者",opts:["I、II","II、III","I、III、IV","III、IV","II、III、IV"],ans:3,exp:"高額現金股利把多餘現金還給股東,III 減少管理者亂花自由現金流量的空間;IV 公司因而須回資本市場籌資,接受市場監督。I、II 與降低代理成本無直接關聯。"},
{exam:"final",ch:9,n:13,stem:"下列何者對「剩餘股利政策」之敘述最正確?",opts:["公司在原物料成本下降時,以節省的費用來發放股利","公司盈餘不佳時不發放股利,盈餘過剩時則發放","當資本公積超過股本時,以超過的部分發放股票股利","當股價過低,應以所剩的現金發放股利","公司內部現金超過營運及投資所需時,才發放現金股利"],ans:4,exp:"剩餘股利政策(Residual Dividend Policy):公司先滿足所有 NPV>0 投資案的權益資金需求,「剩餘」的盈餘才用來發放現金股利。"},
{exam:"final",ch:9,n:14,stem:"下列哪些狀況符合 Lintner 所描述的「股利漸近理論」?\nI. 管理者在確定公司盈餘上升後,才會調高現金股利\nII. 公司在長期中應有一定的股利支出比率\nIII. 經理人會視法人的態度來發放股利\nIV. 公司會儘量避免在增加股利不久後,又減少股利",opts:["I、II","I、IV","I、II、IV","II、III、IV","I、II、III、IV"],ans:2,exp:"Lintner 的股利漸近(平穩)理論:公司有長期目標股利支付率(II),股利調整緩慢且漸進,僅在確認盈餘長期上升後才調高股利(I),並極力避免調高後又調降(IV)。III 與該理論無關。"},
{exam:"final",ch:9,n:15,stem:"下列關於「股利信號假設(Signaling Hypothesis)」的敘述,何者較符合實務觀察?",opts:["減少股利發放通常被解讀為公司有更好的投資機會","公司維持穩定的股利是為了誤導投資人","由於資訊不對稱,管理階層透過股利變動向外傳達公司未來的獲利展望","股利變動與股價變動完全沒有相關性"],ans:2,exp:"股利信號假設:在資訊不對稱下,管理階層比外部投資人更了解公司前景,故以股利變動作為訊號——調高股利傳達對未來獲利的信心,調降則傳達負面訊息。"},
{exam:"final",ch:9,n:16,stem:"上市/上櫃公司買回本身的股份,應列為",opts:["庫藏股","長期投資","短期投資","特別股","保留盈餘"],ans:0,exp:"公司買回自己已發行的股票稱為「庫藏股(Treasury Stock)」,在資產負債表上列為股東權益的「減項」。"},
{exam:"final",ch:9,n:17,stem:"下列何者並不是買回庫藏股之目的?",opts:["提升股價","買回後作為員工股","增加現金流量,以便發放更多的股利","轉換給可轉換債券持有人","買回後減資"],ans:2,exp:"買回庫藏股是「動用」現金、使現金「流出」,不會增加現金流量。其他選項(護盤、員工認股、供債券轉換、減資)都是買回庫藏股的常見目的。"},
{exam:"final",ch:9,n:18,stem:"企業買回庫藏股之後辦理減資,會使每股盈餘 ___、股東權益 ___。",opts:["增加、增加","增加、減少","減少、增加","減少、減少","不變、減少"],ans:1,exp:"買回庫藏股並減資 → 流通股數減少 → 每股盈餘(EPS)上升;同時動用現金買回股份,股東權益總額減少。"},
{exam:"final",ch:9,n:19,stem:"關於「股票購回」作為一種傳達資訊的工具,下列敘述何者較符合「資訊不對稱」下的市場反應?",opts:["由於公司減少了投資,市場通常會視為負面訊息","內部人(經理人)若同時出售持股,則該購回計畫的正面信號最強","股票購回通常比現金股利更能傳達管理階層對股價「被低估」的信心","股票購回對股價沒有任何信號效果"],ans:2,exp:"公司願意以現價買回自家股票,傳達管理階層認為「股價被低估」的強烈訊息,信號效果常比現金股利更強。(B) 內部人同時賣股反而削弱信號的可信度。"},
{exam:"final",ch:9,n:20,stem:"陽光公司今年度發放現金股利 $1.6,年底時每股淨值 $25,股東權益報酬率 16%,股價 $32,則其「股利支付率」與「股利率」各為",opts:["40%、5%","40%、2%","50%、5%","50%、2%","20%、5%"],ans:0,exp:"每股盈餘 EPS = 每股淨值 × ROE = 25 × 16% = $4\n股利支付率 = 每股股利 / EPS = 1.6 / 4 = 40%\n股利率(殖利率)= 每股股利 / 股價 = 1.6 / 32 = 5%"},
{exam:"final",ch:9,n:21,stem:"月色公司之「股利率(Dividend Yield)」為 3%,本益比為 21 倍,則其「股利支付率」為",opts:["7%","14%","40%","63%","70%"],ans:3,exp:"股利率 = D/P = 3%;本益比 = P/E = 21,故 E/P = 1/21\n股利支付率 = D/E = (D/P) ÷ (E/P) = 3% × 21 = 63%"},
{exam:"final",ch:9,n:22,stem:"台灣 X 公司以保留盈餘轉增資進行「無償配股」,每股配發股票股利 $2.00,X 股於除權日前一個交易日收盤價為 $72,而該股除權日之開盤價正好為「除權參考價」;除權當日 X 股上漲了 $1.5,X 股的除權日收盤價為何?",opts:["$61.0","$61.5","$62.0","$71.5","$87.9"],ans:1,exp:"股票股利 $2 = 配股率 2/10 = 0.2 股\n除權參考價 = 前一日收盤價 ÷ (1 + 配股率) = 72 ÷ 1.2 = $60\n除權日收盤價 = 除權參考價 + 當日漲幅 = 60 + 1.5 = $61.5"},
{exam:"final",ch:9,n:23,stem:"台灣 Y 公司發放現金股利與股票股利,「無償配股」$1.00,除權日前一個交易日收盤價為 $56,「除權參考價」為 $50,每股發放的現金股利為何?",opts:["$0.5","$0.8","$1.0","$1.2","$2.0"],ans:2,exp:"配股率 = 無償配股 1 / 面額 10 = 0.1\n除權息參考價公式:參考價 = (前收盤價 − 現金股利) ÷ (1 + 配股率)\n50 = (56 − 現金股利) ÷ 1.1 → 56 − 現金股利 = 55 → 現金股利 = $1.0"},
{exam:"final",ch:9,n:24,stem:"台灣 Z 公司以同時有償及無償方式發放股票股利,除權前一日的收盤價為 $90,其中無償配股 $1,有償配股 $1,認購價 $60,則該公司的「除權參考價」應為",opts:["$72.0","$76.0","$77.5","$78.0","$80.0"],ans:4,exp:"無償配股率 = 1/10 = 0.1;有償配股率 = 1/10 = 0.1\n除權參考價 = (前收盤價 + 有償配股率 × 認購價) ÷ (1 + 無償配股率 + 有償配股率)\n= (90 + 0.1 × 60) ÷ (1 + 0.1 + 0.1) = (90 + 6) ÷ 1.2 = 96 ÷ 1.2 = $80.0"},

// ---------- 第 10 章 中長期貸款 ----------
{exam:"final",ch:10,n:1,stem:"銀行放款給一般企業,並未要求提供擔保品,此種授信工具為下列何者?",opts:["信用狀押匯","信用額度","票據循環性融通","有價證券質押放款","中長期聯合貸款"],ans:1,exp:"「信用額度(Line of Credit)」是銀行依企業信用狀況核給的無擔保借款上限,企業可在額度內循環動用,不需提供擔保品。"},
{exam:"final",ch:10,n:2,stem:"由一或兩家銀行主導放款業務,另外數家銀行依約定之比例共同放款,此種方式稱為",opts:["互保貸款","專案融資","聯合貸款","銀行間拆放款","循環性融通"],ans:2,exp:"「聯合貸款(Syndicated Loan)」由主辦銀行籌組銀行團,各參貸銀行依約定比例共同對單一借款人放款,以分散大額授信風險。"},
{exam:"final",ch:10,n:3,stem:"下列哪一項並不屬於銀行借款給企業時的「5P」原則?",opts:["Prediction:企業主之預測能力","People:企業主之個性及能力","Purpose:借款之目的","Payments:償還借款之來源","Perspective:企業經營之展望"],ans:0,exp:"授信 5P 原則為:People(借款戶)、Purpose(資金用途)、Payments(還款來源)、Protection(債權保障)、Perspective(授信展望)。「Prediction」不在其中。"},
{exam:"final",ch:10,n:4,stem:"「銀行與公司簽約,在一定期間內由公司依本身需求發行票據,且銀行為該票據作信用保證,以便順利取得所需資金。」此為何種融資工具?",opts:["中長期貸款(Term Loans)","可轉讓定期存單(CDs)","票據發行融通(NIFs)","擔保票據發行融通(SNIFs)","循環包銷融通(RUFs)"],ans:3,exp:"正確答案為 (D) 擔保票據發行融通(SNIFs)。題目強調「銀行為該票據作信用保證」,因此不只是一般票據發行融通(NIFs),而是有銀行提供擔保的 SNIFs。"},
{exam:"final",ch:10,n:5,stem:"K 銀行允諾借款 $5 億給 X 公司,X 公司須開出本票(並不在市場上流通),每半年還款後銀行再行放款,此種方式為",opts:["有價證券質押貸款","信用額度","票據發行融通(NIFs)","擔保票據發行融通(SNIFs)","循環包銷融通(RUFs)"],ans:4,exp:"正確答案為 (E) 循環包銷融通(RUFs)。題目重點在銀行承諾一定額度,公司以本票方式取得資金,還款後可再循環動用,屬於可反覆使用的包銷/授信安排。"},
{exam:"final",ch:10,n:6,stem:"銀行辦理中長期授信,為確保債權,常於契約中訂定「消極擔保條款(Negative Pledge Clause)」,其主要意義為何?",opts:["要求借款人必須提供額外的不動產設定抵押","借款人承諾在貸款期間內,不得將其財產再設定負擔予第三人,以保障本行受償順位","要求借款人必須維持盈餘不分配","約定借款人若違約,銀行可逕行處分其所有資產"],ans:1,exp:"消極擔保條款是一種「不作為」承諾:借款人保證不將財產再向其他債權人設定擔保,以維持本行的受償順位。它不要求另提抵押(那是積極擔保)。"},
{exam:"final",ch:10,n:7,stem:"下列何者對「專案融資」之敘述為正確?",opts:["政府所主導的投資案才能申請「專案融資」","最大優點為沒有政治風險","最大缺點為參與公司無法讓投資案的風險獨立","借款機構通常會要求掌控投資案的資產與收入","投資案興建時若因困難產生額外成本,借款機構可向參與者要求賠償"],ans:3,exp:"專案融資(Project Financing)以「專案本身的現金流與資產」作為還款來源與擔保,借款機構通常要求掌控專案的資產與收入。(A) 民間案也可;(B) 仍有政治風險;(C) 優點正是讓風險獨立(無追索或有限追索);(E) 通常為無追索,不能向母公司求償。"},
{exam:"final",ch:10,n:8,stem:"恆星公司向銀行貸款 $1,000 萬,為期一年,年利率 3%,依約定必須有補償性存款 $100 萬,年息為 1%,則該公司的借款實質利率為",opts:["2.00%","2.90%","3.22%","3.55%","4.00%"],ans:2,exp:"利息支出 = 1,000 萬 × 3% = 30 萬\n補償性存款利息收入 = 100 萬 × 1% = 1 萬\n實際可動用金額 = 1,000 − 100 = 900 萬\n實質利率 = (30 − 1) / 900 = 29 / 900 ≈ 3.22%"},
{exam:"final",ch:10,n:9,stem:"出租人提供並維護資產,承租人付費使用該資產,使用時間比資產的經濟壽命短,此種租賃稱為",opts:["營業租賃(Operating Lease)","資本性租賃(Capital Leases)","售後租回(Sale-and-Leaseback)","聯合租賃","槓桿租賃"],ans:0,exp:"營業租賃(Operating Lease):租期短於資產耐用年限,出租人負責維護保養,承租人可中途解約,類似「租用」而非「購買」。"},
{exam:"final",ch:10,n:10,stem:"在進行「租賃」或「借款買進」設備的互斥決策分析時,下列關於「折舊費用」與「利息費用」之稅盾效益的敘述,何者正確?",opts:["租賃情況下,承租人通常能同時享有折舊與利息的稅盾","若採取借款買進設備,企業可以享有折舊費用與貸款利息費用的節稅利益","租賃租金支出不可作為費用抵稅","無論選擇租賃或借款買進,對企業的節稅效果完全相同"],ans:1,exp:"借款買進時,設備為企業資產,可提列折舊;貸款利息亦可列費用,兩者都有稅盾。租賃下資產屬出租人,承租人享有的是「租金費用」抵稅,而非折舊與利息。"},
{exam:"final",ch:10,n:11,stem:"下列敘述中,哪些是公司承作租賃的優點?\nI. 程序較為簡便省時,較符合突發性的需求\nII. 要求相對較不嚴格,較易取得資金\nIII. 租賃的費用要比一般借款的利息低\nIV. 產業若強調生產技術,租賃可加速設備的汰舊換新",opts:["I、II","I、II、IV","II、III","II、III、IV","I、II、III、IV"],ans:1,exp:"I、II、IV 為租賃優點(手續簡便、條件較寬鬆、便於設備汰換)。III 錯誤:租賃內含出租人的利潤與服務成本,整體費用通常「高於」一般借款利息。"},
{exam:"final",ch:10,n:12,stem:"租賃公司出租船舶時,亦負擔油料及維修等服務,此種租賃稱為",opts:["營業租賃(Operating Lease)","售後租回(Sale-and-Leaseback)","乾租賃(Dry Leases)","濕租賃(Wet Leases)","承包租賃"],ans:3,exp:"「濕租賃(Wet Lease)」指出租人連同操作、維修、燃油、人員等服務一併提供;「乾租賃(Dry Lease)」則僅出租設備本身。"},
{exam:"final",ch:10,n:13,stem:"企業在評估「中長期借款」購買設備與「租賃」設備之決策時,應採用下列何種折現率來計算租賃支付額的現值?",opts:["加權平均資本成本(WACC)","稅前借款利率","稅後借款利率","股東權益成本"],ans:2,exp:"租賃 vs. 借款買進的現金流量風險近似於有擔保負債,且租金與利息均有稅盾,故應以「稅後借款利率」作為折現率來比較兩方案的現值。"},
{exam:"final",ch:10,n:14,stem:"下列何者是以股權方式推行「不動產證券化」的重要因素?",opts:["不動產產權所有人的登記移轉","不動產交付信託","政府之仲裁","發行機構是否配發股息","金融機構認購該證券的百分比"],ans:1,exp:"不動產證券化的核心機制是將不動產「交付信託」,由受託機構持有並據以發行受益證券,使不動產的所有權與收益權得以分割流通。"},
{exam:"final",ch:10,n:15,stem:"美國在 2007 年發生了「次級房貸」風暴,「次級房貸」係指",opts:["資產證券化商品","不動產買賣業務","政府以不動產擔保的票據","金融機構本身的房屋貸款","以不動產抵押的認購權證"],ans:0,exp:"次級房貸(Subprime Mortgage)是放款給信用較差借款人的房貸,經包裝後成為「資產證券化商品(如 MBS、CDO)」廣泛銷售,2007 年違約潮引發金融海嘯。"},
{exam:"final",ch:10,n:16,stem:"金融機構以不動產抵押發行債券,將貸款人的利息或提前清償的本金全部交給債券投資人,屬於下列何種證券?",opts:["次級房貸債券(Subprime Bonds)","不動產投資信託(REIT)","不動產資產信託(REAT)","轉付抵押擔保債券(Mortgage Pass-through Bonds)","認購權證(Warrants)"],ans:3,exp:"轉付抵押擔保債券(Pass-through Bonds):將房貸借款人繳付的本息(含提前清償)「直接轉付」給債券投資人,投資人按比例分享所有現金流。"},
{exam:"final",ch:10,n:17,stem:"不動產所有人將具有穩定收入的不動產交付信託,透過嚴謹的查核後,將資產分割為細小單位的基金憑證,以固定收益發行的證券為",opts:["次級房貸債券(Subprime Bonds)","不動產投資信託(REIT)","不動產資產信託(REAT)","轉付抵押擔保債券(Mortgage Pass-through Bonds)","認購權證(Warrants)"],ans:2,exp:"不動產資產信託(REAT)是「先有特定不動產、再交付信託發行受益證券」,以固定收益方式募資;REIT 則是「先募資、再投資不動產」,收益隨營運浮動。"},

// ---------- 第 11 章 權益融資 ----------
{exam:"final",ch:11,n:1,stem:"下列何者為「私有市場(Private Market)」會出現的現象?",opts:["發行債券比向銀行借款普遍","財務資訊透明","代理人問題嚴重","股價明確","公司規模比上市櫃公司大"],ans:2,exp:"私有市場(未上市櫃)資訊不透明、缺乏公開股價與外部監督,代理人問題相對嚴重。(A)(D)(E) 都是公開市場的特徵。"},
{exam:"final",ch:11,n:2,stem:"未上市櫃公司創立後準備量產,要以股權募集資金,則下列哪些是較可能的資金來源?\nI. 天使 II. 公開現金增資 III. 股票選擇權 IV. 創投基金",opts:["I、II","I、IV","II、IV","I、III、IV","II、III、IV"],ans:1,exp:"未上市櫃公司無法「公開」現金增資(II 排除);股票選擇權是員工激勵工具,非籌資管道(III 排除)。天使投資人(I)與創投基金(IV)是新創公司常見的股權資金來源。"},
{exam:"final",ch:11,n:3,stem:"下列哪些是上市櫃後的優點?\nI. 公平市價 II. 流動性大 III. 隱密性高 IV. 容易進出資本市場",opts:["I、II","I、IV","I、II、IV","II、IV","II、III、IV"],ans:2,exp:"上市櫃後享有公開市價(I)、股票流動性高(II)、易於再籌資(IV)。III 錯誤:上市後須揭露財務資訊,「隱密性低」反而是缺點。"},
{exam:"final",ch:11,n:4,stem:"公司在初次上市櫃(IPOs)當天的市價超過承銷價,這種現象稱為",opts:["過額配售(Over-allotment)","代理人問題(Agency Problems)","承銷商護盤(Price Maintenance)","折價(Underpricing)","反應過度(Over-reaction)"],ans:3,exp:"IPO「折價(Underpricing)」:承銷價訂得低於上市後市價,使上市首日股價上漲,是 IPO 普遍存在的現象。"},
{exam:"final",ch:11,n:5,stem:"公司在初次上市櫃(IPOs)時,實施何種措施,具有維護股價的功能?",opts:["過額配售(Over-allotment)","優先認購(Privileged Subscription)","私募(Private Placement)","法人說明會(Road Show)","架上註冊(Shelf Registration)"],ans:0,exp:"過額配售(綠鞋條款)讓承銷商可超額銷售一定比例股票,上市後若股價下跌可在市場買回交割、達到護盤穩定股價的效果。"},
{exam:"final",ch:11,n:6,stem:"公司在初次上市櫃(IPOs)之後,短期內的股價表現 ___ 大盤,長期的股價表現 ___ 大盤。",opts:["優於、優於","優於、劣於","劣於、優於","劣於、劣於","優於、約等於"],ans:1,exp:"IPO 的實證現象:因折價使「短期」報酬優於大盤;但「長期」(數年後)股價表現普遍「劣於」大盤,即 IPO 長期績效不佳之謎。"},
{exam:"final",ch:11,n:7,stem:"公司發行新股之後,長期的股價表現明顯比大盤差,下列何者最能解釋這個現象?",opts:["主管機關未嚴格把關","新股的折價過高","承銷商未積極護盤","市場交易制度不佳","投資人在發行時過度樂觀"],ans:4,exp:"新股長期績效不佳的主流解釋:公司常選在市場樂觀、股價偏高時發行新股,投資人「過度樂觀」追高,待熱潮退去股價向下修正,長期報酬劣於大盤。"},
{exam:"final",ch:11,n:8,stem:"上市櫃公司公開發行新股,大部分先由原股東按比率申購、少部分由不特定人以抽籤的方式申購,此種活動稱為",opts:["過額配售","私募","有償配股","現金增資","資本預算"],ans:3,exp:"「現金增資」發行新股募集現金,依規定須保留一定比例由原股東優先按持股比率認購,其餘對外公開承銷(抽籤)。"},
{exam:"final",ch:11,n:9,stem:"下列有關「私募(Private Placements)」之敘述中,何者最正確?",opts:["「私募」是指以慈善或學術為目的之捐款","企業不可用「私募」發行債券","股票「私募」的對象多為特定人","「私募」較適合募集高額的資金","「私募」通常是由承銷商刊登廣告來募集資金"],ans:2,exp:"私募是向「特定人」(如策略投資人、特定法人)洽購有價證券,不公開招募。(A) 與捐款無關;(B) 債券也可私募;(D) 公開發行較適合大額募資;(E) 私募不得公開廣告招募。"},
{exam:"final",ch:11,n:10,stem:"承銷商依議定價格盡力出售證券,承銷期限屆滿未售完之證券歸還給發行公司,此種承銷方式稱為",opts:["包銷","代銷","分銷","聯合承銷","議價承銷"],ans:1,exp:"「代銷」承銷商僅「盡力銷售」,賣不完的部分退還發行公司,風險由發行公司承擔;「包銷」則由承銷商先買下全部、自行承擔賣不完的風險。"},
{exam:"final",ch:11,n:11,stem:"公司發行新股時,提撥一部分的股票讓不特定的投資人以抽籤的方式申購,此為何種承銷方式?",opts:["公開申購","競價拍賣","申報生效","詢價圈購","私募"],ans:0,exp:"「公開申購」(公開抽籤)讓不特定投資人以固定承銷價提出申購,僧多粥少時以抽籤決定中籤者。"},
{exam:"final",ch:11,n:12,stem:"公司發行新股時,投資人提出願意買入的價格與數量,由承銷商與發行公司視實際狀況決定價格與得標者,此為何種承銷方式?",opts:["公開申購","競價拍賣","申報生效","詢價圈購","私募"],ans:3,exp:"「詢價圈購(Bookbuilding)」:承銷商向潛在投資人詢價、彙整需求量與價格,再與發行公司「議定」最終承銷價與配售對象。"},
{exam:"final",ch:11,n:13,stem:"下列有關承銷股票方式中,何者是由出價較高者得標?",opts:["公開申購","競價拍賣","申報生效","申請核准","私下募集"],ans:1,exp:"「競價拍賣(Auction)」由投資人競相出價,依出價高低排序,「價高者優先得標」,可使承銷價更貼近市場真實需求。"},
{exam:"final",ch:11,n:14,stem:"依據現行規定,我國初次上市、上櫃(IPO)案件之承銷方式,除另有規定外,應採取下列何種方式為主?",opts:["全數詢價圈購","全數抽籤申購","競價拍賣(Auction)配合公開申購","自由議價承銷"],ans:2,exp:"我國現行 IPO 承銷制度以「競價拍賣」決定承銷價,再「配合公開申購(抽籤)」釋出部分股票給一般投資人。"},
{exam:"final",ch:11,n:15,stem:"台灣的企業應向哪一個單位申請上市?",opts:["台灣證券交易所","證期局","財政部","證券商公會","證券集中保管公司"],ans:0,exp:"申請「上市」向「台灣證券交易所(TWSE)」提出;申請「上櫃」則向證券櫃檯買賣中心(OTC)提出。"},
{exam:"final",ch:11,n:16,stem:"下列有關台灣公司上市櫃條件的敘述中,何者為錯誤?",opts:["必須已設立一段時間","上市櫃前之獲利須達標準","必須提出會計師簽證之財務報表","公司規模夠大則不須承銷商輔導","達一定程度的股權分散"],ans:3,exp:"無論公司規模大小,申請上市櫃都必須經過承銷商(證券承銷商)的輔導,(D) 敘述錯誤。其餘為正確的上市櫃條件。"},
{exam:"final",ch:11,n:17,stem:"台灣證券市場自 2002 年 1 月起,正式開放了「興櫃股票市場」,此一市場的股票特性為何?",opts:["已上櫃但正在申請轉上市的公司","已申報上市櫃輔導、但尚未正式上市櫃的公開發行公司","尚未正式上市櫃之控股公司","尚未公開發行、但具有潛力的科技公司","資本額未達上市櫃標準的電腦軟體公司"],ans:1,exp:"興櫃市場是「上市櫃前的預備市場」,掛牌對象為已申報上市櫃輔導、但尚未正式掛牌的公開發行公司,提供其股票先行交易的場所。"},
{exam:"final",ch:11,n:18,stem:"下列有關台灣公司上市櫃的敘述中,何者為錯誤?",opts:["必須先辦理「公開發行」","必須先在興櫃市場掛牌一段時間","有勞資糾紛或污染環境可能無法上市櫃","上市櫃後之股價首五日無漲跌停之限制","公司承銷價格由證交所或櫃檯買賣中心決定"],ans:4,exp:"承銷價格是由「發行公司與承銷商」議定(或經競價拍賣形成),並非由證交所或櫃買中心決定,(E) 錯誤。其餘敘述正確。"},
{exam:"final",ch:11,n:19,stem:"美國公司舉辦發行新股「上市櫃說明會(Roadshow)」時,機構投資人可填申請單,註明願意買入之價格,但並沒義務買進,此種方式稱為",opts:["公開申購(Open Subscription)","競價拍賣(Auction)","詢價圈購(Bookbuilding)","架上註冊(Shelf Registration)","優先認購(Privileged Subscription)"],ans:2,exp:"詢價圈購(Bookbuilding):承銷商透過 Roadshow 蒐集機構投資人的意願價格與數量(意願不具拘束力),據以建立需求簿、訂定承銷價。"},
{exam:"final",ch:11,n:20,stem:"下列有關美國 1982 年「架上註冊(Shelf Registration)」之敘述中,何者最正確?",opts:["企業向主管機關申請一定數量的證券,在 2 年內視本身的需要來發行","證券主管機關放寬高智慧財產事業之上市櫃標準","企業可直接在電腦上申請上市櫃","企業發行證券時將公開說明書傳送給主管機關","企業在特殊狀況下發行證券,需提出財力證明"],ans:0,exp:"架上註冊(Shelf Registration, SEC Rule 415):企業可一次向主管機關註冊一定數量的證券,於兩年內視市場時機與資金需求「分批發行」,如同先放在架上、需要時再取用。"},
{exam:"final",ch:11,n:21,stem:"美國企業上市櫃半年後價格明顯下跌,下列何者最能解釋這個現象?",opts:["承銷商出售股票","承銷商不再護盤安定股價","流通過高所造成","內部人閉鎖期滿,出售股票造成賣壓","發放股利所造成賣壓"],ans:3,exp:"IPO 通常設有內部人「閉鎖期(Lock-up Period,常為 180 天)」。閉鎖期屆滿後,內部人(創辦人、員工、創投)可出售持股,大量賣壓導致股價下跌。"},
{exam:"final",ch:11,n:22,stem:"有價證券私募之應募人及購買人,自該私募有價證券交付日起多久期間,得自由賣出,不受轉讓數量及對象之限制?",opts:["滿六個月","滿一年","滿二年","滿三年"],ans:3,exp:"依我國證券交易法規定,私募有價證券自交付日起「滿三年」後,始得自由轉讓,不再受轉讓數量及對象之限制。"},

// ---------- 第 12 章 營運資金 ----------
{exam:"final",ch:12,n:1,stem:"下列何者對「淨營運資金」的定義最正確?",opts:["應收帳款 + 應付帳款 − 存貨","應收帳款 + 存貨 − 短期貸款","流動資產 − 流動負債","應收帳款 − 應付帳款","流動資產 − 流動負債 + 當期盈餘"],ans:2,exp:"淨營運資金(Net Working Capital)= 流動資產 − 流動負債,衡量公司可運用的短期資金淨額。"},
{exam:"final",ch:12,n:2,stem:"下列何者將增加公司的營運資金?",opts:["存貨增加","應收帳款增加","增加員工","有價證券減少","應付帳款減少"],ans:3,exp:"正確答案為 (D) 有價證券減少。此題所稱營運資金偏向企業實際投入日常營運的資金;有價證券減少通常表示資金由短期投資轉為營運使用,因此會增加營運資金。"},
{exam:"final",ch:12,n:3,stem:"某公司年底時收回大筆的應收帳款,則該公司的流動比率及速動比率會如何變化?",opts:["流動比率下降、速動比率增加","流動比率增加、速動比率下降","流動比率及速動比率皆增加","流動比率及速動比率皆下降","流動比率及速動比率不變"],ans:4,exp:"收回應收帳款是「應收帳款↓、現金↑」,兩者都是流動資產(也都屬速動資產),總額不變。故流動比率與速動比率皆「不變」。"},
{exam:"final",ch:12,n:4,stem:"公司以現金購買商品,商品出售轉為應收帳款,再由應收帳款收回現金,此種過程稱為",opts:["會計循環","營業循環","商業循環","現金循環","信用循環"],ans:1,exp:"「營業循環(Operating Cycle)」指從購入存貨、出售形成應收帳款、到收回現金的完整流程,= 存貨轉換期間 + 應收帳款收現期間。"},
{exam:"final",ch:12,n:5,stem:"下列何者對企業營運週期的定義最正確?",opts:["存貨轉換期加上應收帳款期","存貨轉換期加上應付帳款期","存貨轉換期加上現金轉換期","應付帳款期加上應收帳款期","採購期加上存貨轉換期"],ans:0,exp:"營運(營業)週期 = 存貨轉換期間 + 應收帳款收現期間。若再扣掉應付帳款付現期間,則為「現金轉換循環」。"},
{exam:"final",ch:12,n:6,stem:"某公司的銷售金額與同業類似,但應收帳款週轉率遠高於同業,這種情況最可能是因為",opts:["信用政策太寬鬆","信用政策太嚴格","客戶無法如期支付","收帳人員不夠努力","存貨管理不良"],ans:1,exp:"應收帳款週轉率高 → 收現速度快、應收帳款餘額相對少,通常反映「信用政策較嚴格」(賒銷條件嚴、收款快)。寬鬆政策則會使週轉率下降。"},
{exam:"final",ch:12,n:7,stem:"下列何者對營運資金「寬鬆政策(Relaxed Policy)」的描述最正確?",opts:["購買多餘的固定資產,便於擴充","以自有資金因應營運上的需求","以長期融資獲得資本,因應平日營運所需後仍有多餘的資金","多利用租賃,以免投資過多於固定資產","寬鬆評估客戶之信用,以增加營業額"],ans:2,exp:"營運資金的「寬鬆(保守)政策」是指多用長期資金支應營運需求,維持較高的流動資產與現金水位,平日營運所需之外仍有餘裕,風險低但成本較高。"},
{exam:"final",ch:12,n:8,stem:"珊瑚公司的應收帳款週轉率遠高於同業,這種情況可能代表",opts:["使用過高的財務槓桿","收帳人員不夠努力","客戶無法如期支付","信用政策太寬鬆","信用政策太嚴格"],ans:4,exp:"應收帳款週轉率遠高於同業 → 賒銷條件嚴、收款快,代表「信用政策太嚴格」。過嚴的信用政策雖降低壞帳,但可能因此流失客戶、抑制銷售。"},
{exam:"final",ch:12,n:9,stem:"企業以存貨質押取得貸款,金融機構以編製存貨序號的方式進行控管,此種作法屬於下列何者?",opts:["流動存貨質押","信託收據存貨貸款","倉單存貨貸款","JIT 存貨管理","MRP 存貨管理"],ans:1,exp:"信託收據存貨貸款(Trust Receipt Loan):借款人以信託收據方式持有特定可辨識(編號)的存貨,出售後須將價款優先償還貸款,金融機構藉序號控管特定存貨。"},
{exam:"final",ch:12,n:10,stem:"供應商提供付款條件「1/20,n/60」係指?",opts:["20 天內付款享有 1% 折扣,付款期為 60 天","60 天內付款享有 5% 折扣","60 天內每 20 天付款一次","20 天內付款享有較高的折扣,21~60 天每天減少折扣 0.1%","貨到付款 20%,其餘 60 天內付清"],ans:0,exp:"信用條件「1/20, n/60」解讀:20 天內付款可享 1% 現金折扣;若不取折扣,則最遲須於 60 天內付清全額。"},
{exam:"final",ch:12,n:11,stem:"應收帳款承購具有「追索權(Recourse)」係指",opts:["承購者不須通知客戶,到期時直接收款","債權人必須提供不動產抵押給承購者","債務人違約,債權人可向承購者索賠","債務人違約,承購者可向債權人索賠","債務人違約,承購者可要求保險業者理賠"],ans:3,exp:"「有追索權」的應收帳款承購:若應收帳款的債務人(客戶)違約不付款,承購商(Factor)可「回頭向出售帳款的債權人(原賣方)索賠」,信用風險仍由原債權人承擔。"},
{exam:"final",ch:12,n:12,stem:"「應收帳款承購商(Factor)」對「有追索權(With Recourse)」的業務中,承作下列哪些工作?\nI. 保證應收帳款債務人之信用 II. 承擔應收帳款債務人之信用風險\nIII. 應收帳款催收服務 IV. 提供融資應收帳款之債權人",opts:["I、II","I、II、III","II、III、IV","III、IV","I、II、III、IV"],ans:4,exp:"正確答案為 (E) I、II、III、IV。應收帳款承購商(Factor)通常會提供債務人信用調查與保證、承擔或管理信用風險、協助催收帳款,並可提供應收帳款融資。"},
{exam:"final",ch:12,n:13,stem:"當企業決定「放寬」信用標準時,通常會導致下列哪種結果?",opts:["應收帳款週轉率上升","現金循環天數必然縮短","存貨轉換期間縮短","帳齡分析表中的逾期帳款比例下降","銷貨收入可能增加,但壞帳損失風險也隨之上升"],ans:4,exp:"放寬信用標準會吸引更多客戶賒購,銷貨收入可能增加;但同時也接受信用較差的客戶,壞帳損失與逾期帳款風險隨之上升。(A) 週轉率會下降;(D) 逾期比例會上升。"},
{exam:"final",ch:12,n:14,stem:"下列有關現金管理的作法中,何者最正確?",opts:["現金收支與記帳應由同一人負責","編製現金預算時必須納入折舊費用","業務人員收到客戶即期支票,應自行存入銀行","若現金交易頻繁,應以收銀機或電腦記錄交易","保留愈多的現金,對公司愈有利"],ans:3,exp:"現金交易頻繁時,應以收銀機或電腦完整記錄交易以利控管。(A) 應「分工」以收內部牽制之效;(B) 折舊是非現金費用,不列入現金預算;(C) 支票應交財務部門統一處理;(E) 現金過多會閒置、降低資金效率。"},
{exam:"final",ch:12,n:15,stem:"企業編製應收帳款的天數與分布狀況,為下列何種報告?",opts:["現金流量表","帳齡分析表","股東權益變動表","資本預算估計表","會計師查核報告書"],ans:1,exp:"「帳齡分析表(Aging Schedule)」按應收帳款積欠天數分組(如 30 天內、31~60 天…),呈現各帳款的逾期分布,協助評估收款績效與壞帳風險。"},
{exam:"final",ch:12,n:16,stem:"買、賣方往來已久,收到貨品時分別記為應付、應收帳款,雙方的記錄若不一致,則以發票為憑據,這種方式是",opts:["記帳付款(Open Account)","附條件銷售合約(Conditional Sales Contract)","遠期契約(Forward Contract)","寄售(Consignment)","票據銷售"],ans:0,exp:"「記帳付款(Open Account)」是建立在雙方信任基礎上的賒銷方式,不另立票據,僅以發票及帳簿記錄為憑,常見於長期往來的買賣雙方。"},
{exam:"final",ch:12,n:17,stem:"黃金公司今年度的存貨 $1,250,000,去年度 $1,100,000;應收帳款週轉率 8 次,存貨週轉率 6 次,則其營業循環週期共幾天(一年 365 天)?",opts:["164.5 天","106.5 天","73.2 天","18.3 天","91.3 天"],ans:1,exp:"存貨轉換期間 = 365 / 存貨週轉率 = 365 / 6 ≈ 60.83 天\n應收帳款收現期間 = 365 / 應收帳款週轉率 = 365 / 8 ≈ 45.63 天\n營業循環週期 = 60.83 + 45.63 ≈ 106.5 天"},
{exam:"final",ch:12,n:18,stem:"甲公司的存貨週轉天數為 30 天,應收帳款收現天數為 60 天,應付帳款付現天數為 45 天,總資產週轉天數為 120 天,試問甲公司之現金循環天數為下列何者?",opts:["75 天","90 天","165 天","45 天","30 天"],ans:3,exp:"現金循環天數(現金轉換循環)= 存貨週轉天數 + 應收帳款收現天數 − 應付帳款付現天數\n= 30 + 60 − 45 = 45 天。(總資產週轉天數為干擾項,不列入計算)"},
{exam:"final",ch:12,n:19,stem:"鋁鎂公司的年銷售金額為 $2,500 百萬,毛利率為 12%,年初存貨為 $450 百萬、年底 $550 百萬,則該公司的「存貨轉換期間」為",opts:["102 天","98 天","91 天","83 天","75 天"],ans:3,exp:"銷貨成本 = 銷售額 × (1 − 毛利率) = 2,500 × 88% = 2,200 百萬\n平均存貨 = (450 + 550) / 2 = 500 百萬\n存貨週轉率 = 2,200 / 500 = 4.4 次\n存貨轉換期間 = 365 / 4.4 ≈ 83 天"},
{exam:"final",ch:12,n:20,stem:"白金公司以 $2,000 萬銷售一批商品,給予客戶的付款條件為「1/10,n/40」,若一年以 365 天計算,則該付款條件所隱含之年利率為多少?",opts:["6.0%","12.02%","12.29%","13.26%","14.10%"],ans:2,exp:"放棄折扣的隱含年利率公式:\n= [折扣率 / (1 − 折扣率)] × [365 / (信用期 − 折扣期)]\n= [1% / 99%] × [365 / (40 − 10)]\n= 0.010101 × 12.1667 ≈ 12.29%"},

// ---------- 第 13 章 財務規劃 ----------
{exam:"final",ch:13,n:1,stem:"「財務規劃」是公司針對某段期間內的哪一個事項進行事前計劃?",opts:["調整資本結構","資金需求","人事結構及費用","處分資產","選任會計師"],ans:1,exp:"財務規劃的核心是預估未來某期間的「資金需求」——預測營運與投資所需資金,並事先安排資金來源。"},
{exam:"final",ch:13,n:2,stem:"下列何者對「財務規劃」的影響最大?",opts:["流動資產佔總資產的比率","折舊費可否加速","銷售的變動","會計原則的變動","董事會的結構"],ans:2,exp:"財務規劃通常以「銷售預測」為起點,多數資產、負債與盈餘項目都隨銷售變動,故「銷售的變動」對財務規劃影響最大。"},
{exam:"final",ch:13,n:3,stem:"某公司預計下一年度的獲利狀況不變,則下列哪些項目是進行「財務規劃」時應考慮的事項?\nI. 考慮所採用的會計方法 II. 對總體環境做假設或預估\nIII. 考慮資產需求 IV. 進行銷售預測",opts:["I、II","I、II、IV","II、IV","II、III、IV","I、II、III、IV"],ans:3,exp:"正確答案為 (D) II、III、IV。財務規劃通常以銷售預測為起點,並對總體環境做假設,再估計資產需求與資金需求;會計方法並非本題進行財務規劃時的主要考量。"},
{exam:"final",ch:13,n:4,stem:"在正常情況下,預期公司銷售金額將大幅上升,則「額外資金需求(AFN)」將 ___,通常須進行 ___。",opts:["增加,融資","增加,證券投資","減少,融資","減少,證券投資","不變,合資"],ans:0,exp:"銷售大幅成長 → 須增添資產(存貨、應收、固定資產)→ 所需資金超過自發性負債與保留盈餘所能支應 → AFN 增加,公司須對外「融資」。"},
{exam:"final",ch:13,n:5,stem:"某公司預計下一年度的獲利狀況不變,則下列哪些活動會使其「額外資金需求(AFN)」增加?\nI. 調高現金股利發放比率 II. 發放股票股利\nIII. 延展向銀行的借款 IV. 買回庫藏股",opts:["I、II","I、IV","I、II、IV","II、III","II、III、IV"],ans:1,exp:"I 調高現金股利 → 保留盈餘減少 → AFN 增加;IV 買回庫藏股 → 動用現金、權益減少 → AFN 增加。II 發股票股利不動用現金;III 延展借款是維持既有資金,不增加 AFN。"},
{exam:"final",ch:13,n:6,stem:"下列有關「額外資金需求(AFN)」估計項目的程序,何者最正確?\nI. 估計資產負債表 II. 估計損益表 III. 估計 AFN IV. 融資回饋",opts:["I、II、III、IV","I、III、II、IV","II、I、III、IV","II、I、IV、III","II、III、I、IV"],ans:2,exp:"AFN 估計程序:先估計損益表(II,得出保留盈餘)→ 估計資產負債表(I,得出資產與自發性負債)→ 算出 AFN(III)→ 進行融資回饋調整(IV)。"},
{exam:"final",ch:13,n:7,stem:"在預估「額外資金需求(AFN)」時,為何要進行「融資回饋」?",opts:["決定融資方式後,卻因而產生原先未估計的費用","難以估計資產負債表中的自發性資產與負債","損益表中的保留盈餘造成估計上的困難","公式的基本假設與實際情況不符","計算時小數點造成的誤差,必須回饋調整"],ans:0,exp:"融資回饋(Financing Feedback):公司為籌措 AFN 而舉債或發股,會「新增利息費用或股利」,使淨利與保留盈餘改變,進而又影響 AFN,需反覆回饋調整直到收斂。"},
{exam:"final",ch:13,n:8,stem:"當「額外資金需求(AFN)」為負時,管理者適合採取下列何種措施?",opts:["發行新股","另舉新債","處分固定資產","存貨質押借款","買回庫藏股"],ans:4,exp:"AFN 為負代表公司資金「有剩餘」。此時不需對外籌資(排除 A、B、C、D),反而可運用多餘資金買回庫藏股、增發股利或償還債務。"},
{exam:"final",ch:13,n:9,stem:"其他條件不變,下列有關「額外資金需求(AFN)」的敘述中,何者最正確?",opts:["資產與銷售的關聯性愈高,則銷售增加會使 AFN 下降","銷售增加時,存貨若以非線性關係增加,將使 AFN 下降","流動負債隨銷售變動的關聯性愈高,則銷售增加會使 AFN 上升","公司下一年度的純益率若上升,會使 AFN 下降","公司若調高下一年度的現金股利支付比率,會使 AFN 下降"],ans:3,exp:"純益率上升 → 保留盈餘增加 → 內部資金增加 → AFN 下降。(A) 資產關聯性高,銷售增加時所需資產更多,AFN 上升;(C) 自發性負債關聯性高,可支應更多資金,AFN 下降;(E) 調高股利使保留盈餘減少,AFN 上升。"},
{exam:"final",ch:13,n:10,stem:"公司以線性公式計算「額外資金需求(AFN)」時,下列哪些原因會使計算結果產生偏差?\nI. 存貨以批量方式進貨 II. 負債比率很低\nIII. 公司更換法人股東 IV. 成本佔銷售之比率隨銷售成長下降",opts:["I、II","I、IV","I、II、IV","II、III、IV","I、II、III、IV"],ans:1,exp:"線性 AFN 公式假設各項目與銷售「等比例(線性)」變動。I 存貨批量進貨呈階梯式、非線性;IV 成本比率隨銷售下降,代表規模經濟,亦非線性。兩者都會使線性公式產生偏差。II、III 與線性假設無關。"},
{exam:"final",ch:13,n:11,stem:"去年,葛丁豪公司的銷貨額是 250 百萬元,固定資產 75 百萬元,其產能利用率為 80%。如果該公司的產能利用率達到 100%,它能支持的最大銷貨額是多少?",opts:["361.8 百萬元","328.1 百萬元","344.5 百萬元","312.5 百萬元","379.8 百萬元"],ans:3,exp:"全產能銷貨額 = 目前銷貨額 ÷ 產能利用率\n= 250 ÷ 80% = 312.5 百萬元\n(現有固定資產在 100% 產能下最多可支持 312.5 百萬元的銷貨)"},
{exam:"final",ch:13,n:12,stem:"將來公司本年度銷貨收入為 $1,000,000,預計明年銷貨金額成長 20%。已知資產對銷貨為 60%,自發性負債對銷貨為 10%,稅後純益率 5%,股利發放率為 40%,若採全產能運作,請計算其明年之額外資金需求(AFN)為多少?",opts:["$80,000","$36,000","$64,000","$80,000","$84,000"],ans:2,exp:"正確答案為 (C) $64,000。銷貨增加額 ΔS = 1,000,000 × 20% = 200,000;明年銷貨 = 1,200,000。AFN = (資產/銷貨)×ΔS − (自發性負債/銷貨)×ΔS − (明年銷貨 × 純益率 × 保留比率) = 60%×200,000 − 10%×200,000 − 1,200,000×5%×(1−40%) = 120,000 − 20,000 − 36,000 = $64,000。"},

// ---------- 第 14 章 重組與併購 ----------
{exam:"final",ch:14,n:1,stem:"當 A、B 兩家公司合併,B 公司之法人人格消滅,其權利義務全部由存續公司 A 概括承受,此種合併稱為",opts:["吸收併購","惡意併購","創設併購","垂直式併購","水平式併購"],ans:0,exp:"「吸收合併(Statutory Merger)」:合併後僅一家公司存續,另一家(B)消滅,其權利義務由存續公司(A)概括承受。若兩家都消滅、另設新公司則為「創設合併」。"},
{exam:"final",ch:14,n:2,stem:"不同行業但彼此具有互補效果之併購稱為",opts:["水平式合併","吸收合併","同源式併購","垂直式合併","複合式併購"],ans:2,exp:"「同源式併購(Congeneric Merger)」指產業相關、具技術或市場互補效果,但非直接同業、也非上下游關係的併購。"},
{exam:"final",ch:14,n:3,stem:"正常情況下,下列何種併購最能發揮「規模經濟」效果?",opts:["水平式合併","融資買下","同源式併購","垂直式合併","複合式併購"],ans:0,exp:"「水平式合併」是同產業、同性質公司的結合,能擴大產銷規模、降低單位成本,最能發揮「規模經濟」效果。"},

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, function (c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
  });
}


const OCR_CONFIG = {

function buildQuestionIndex() {
  if (questionIndexCache) return questionIndexCache;
  questionIndexCache = QUESTIONS.map(function (q) {
    const answerLetter = LETTERS[q.ans] || '?';
    const answerText = q.opts[q.ans] || '';
    const sourceText = [q.stem].concat(q.opts).join(' ');
    return {
      q: q,
      answerLetter: answerLetter,
      answerText: answerText,
      normalized: normalizeForMatch(sourceText),
      preview: q.stem.replace(/\n/g, ' ').slice(0, 90)
    };
  });
  return questionIndexCache;
}

function normalizeForMatch(text) {
  return String(text || '')
    .normalize('NFKC')
    .toLowerCase()
    .replace(/[Ａ-ＥA-E][\.．、:：]/g, '')
    .replace(/[()（）［］\[\]{}｛｝〈〉《》「」『』,，.。:：;；!?！？\s\-—_]/g, '')
    .replace(/[^\u0000-\u007f\u3400-\u9fff]/g, '')
    .replace(/0/g, 'o')
    .replace(/1/g, 'l');
}

function bigramSet(s) {
  const set = new Set();
  if (!s) return set;
  if (s.length === 1) { set.add(s); return set; }
  for (let i = 0; i < s.length - 1; i++) set.add(s.slice(i, i + 2));
  return set;
}

function similarityScore(a, b) {
  if (!a || !b) return 0;
  if (b.indexOf(a) !== -1 || a.indexOf(b) !== -1) return Math.min(0.96, Math.min(a.length, b.length) / Math.max(a.length, b.length) + 0.18);
  const aSet = bigramSet(a);
  const bSet = bigramSet(b);
  let hit = 0;
  aSet.forEach(function (x) { if (bSet.has(x)) hit++; });
  return (2 * hit) / Math.max(1, aSet.size + bSet.size);
}

function findQuestionMatches(segmentText) {
  const normalized = normalizeForMatch(segmentText);
  const questionNumber = extractQuestionNumber(segmentText);
  return buildQuestionIndex().map(function (item) {
    let score = similarityScore(normalized, item.normalized);
    if (questionNumber && item.q.n === questionNumber) score += 0.04;
    return Object.assign({}, item, { score: Math.min(score, 0.99) });
  }).sort(function (a, b) { return b.score - a.score; }).slice(0, 3);
}

function extractQuestionNumber(text) {
  const m = String(text || '').match(/(?:^|\n)\s*(?:[（(]\s*[）)]\s*)?(\d{1,3})\s*[\.．、]/);
  return m ? parseInt(m[1], 10) : null;
}

function splitOcrQuestions(text) {
  const cleaned = String(text || '').replace(/\r/g, '\n').replace(/[ \t]+/g, ' ').replace(/\n{2,}/g, '\n');
  const re = /(?:^|\n)\s*(?:[（(]\s*[）)]\s*)?\d{1,3}\s*[\.．、]/g;
  const starts = [];
  let m;
  while ((m = re.exec(cleaned)) !== null) starts.push(m.index + (cleaned[m.index] === '\n' ? 1 : 0));
  if (starts.length < 2) return cleaned.trim() ? [cleaned.trim()] : [];
  return starts.map(function (start, i) {
    const end = i + 1 < starts.length ? starts[i + 1] : cleaned.length;
    return cleaned.slice(start, end).trim();
  }).filter(function (part) { return normalizeForMatch(part).length > 8; });
}

function confidenceLabel(score) {
  if (score >= 0.42) return '<span class="badge badge-ok">高信心</span>';
  if (score >= 0.26) return '<span class="badge">請確認</span>';
  return '<span class="badge badge-no">低信心</span>';
}

function onScanFileSelected(evt) {
  const file = evt.target.files && evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function () {
    scanState.imageDataUrl = reader.result;
    scanState.rotation = 0;
    prepareScanImage().then(renderScanPreview).catch(function (err) { renderScanError(err.message || String(err)); });
  };
  reader.readAsDataURL(file);
}

function prepareScanImage() {
  return new Promise(function (resolve, reject) {
    const img = new Image();
    img.onload = function () {
      const rotated = scanState.rotation % 180 !== 0;
      const sourceW = rotated ? img.height : img.width;
      const sourceH = rotated ? img.width : img.height;
      const maxSide = 1800;
      const scale = Math.min(1, maxSide / Math.max(sourceW, sourceH));
      const canvas = document.createElement('canvas');
      canvas.width = Math.max(1, Math.round(sourceW * scale));
      canvas.height = Math.max(1, Math.round(sourceH * scale));
      const ctx = canvas.getContext('2d');
      ctx.save();
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.translate(canvas.width / 2, canvas.height / 2);
      ctx.rotate(scanState.rotation * Math.PI / 180);
      ctx.drawImage(img, -img.width * scale / 2, -img.height * scale / 2, img.width * scale, img.height * scale);
      ctx.restore();
      enhancePaperCanvas(canvas);
      scanState.processedDataUrl = canvas.toDataURL('image/jpeg', 0.92);
      resolve();
    };
    img.onerror = function () { reject(new Error('圖片讀取失敗，請換一張照片再試。')); };
    img.src = scanState.imageDataUrl;
  });
}

function enhancePaperCanvas(canvas) {
  const ctx = canvas.getContext('2d');
  const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = img.data;
  let sum = 0;
  for (let i = 0; i < data.length; i += 4) {
    const gray = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
    sum += gray;
  }
  const avg = sum / (data.length / 4);
  for (let i = 0; i < data.length; i += 4) {
    let gray = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
    gray = (gray - avg) * 1.45 + 205;
    gray = Math.max(0, Math.min(255, gray));
    data[i] = data[i + 1] = data[i + 2] = gray;
  }
  ctx.putImageData(img, 0, 0);
}
