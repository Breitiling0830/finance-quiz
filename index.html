function rotateScan(deg) {
  scanState.rotation = (scanState.rotation + deg + 360) % 360;
  scanState.cropRect = null;
  prepareScanImage().then(renderScanPreview).catch(function (err) { renderScanError(err.message || String(err)); });
}

function setupScanCanvas() {
  const canvas = document.getElementById('scan-crop-canvas');
  const img = new Image();
  img.onload = function () {
    canvas.width = img.width;
    canvas.height = img.height;
    drawScanCanvas(img);
    canvas._scanImage = img;
  };
  img.src = scanState.processedDataUrl;
  canvas.addEventListener('pointerdown', function (evt) {
    if (!scanState.cropMode) return;
    const p = canvasPoint(evt, canvas);
    scanState.dragStart = p;
    scanState.cropRect = { x: p.x, y: p.y, w: 0, h: 0 };
  });
  canvas.addEventListener('pointermove', function (evt) {
    if (!scanState.cropMode || !scanState.dragStart) return;
    const p = canvasPoint(evt, canvas);
    scanState.cropRect = rectFromPoints(scanState.dragStart, p);
    drawScanCanvas(canvas._scanImage);
  });
  canvas.addEventListener('pointerup', function () { scanState.dragStart = null; drawScanCanvas(canvas._scanImage); });
}

function canvasPoint(evt, canvas) {
  const rect = canvas.getBoundingClientRect();
  return { x: (evt.clientX - rect.left) * canvas.width / rect.width, y: (evt.clientY - rect.top) * canvas.height / rect.height };
}
function rectFromPoints(a, b) { return { x: Math.min(a.x, b.x), y: Math.min(a.y, b.y), w: Math.abs(a.x - b.x), h: Math.abs(a.y - b.y) }; }

function drawScanCanvas(img) {
  const canvas = document.getElementById('scan-crop-canvas');
  if (!canvas || !img) return;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(img, 0, 0);
  if (scanState.cropMode) {
    ctx.fillStyle = 'rgba(24, 95, 165, 0.10)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }
  if (scanState.cropRect && scanState.cropRect.w > 4 && scanState.cropRect.h > 4) {
    const r = scanState.cropRect;
    ctx.save();
    ctx.strokeStyle = '#185fa5';
    ctx.lineWidth = Math.max(4, canvas.width / 300);
    ctx.setLineDash([14, 8]);
    ctx.strokeRect(r.x, r.y, r.w, r.h);
    ctx.restore();
  }
}

function toggleCropMode() {
  scanState.cropMode = !scanState.cropMode;
  scanState.cropRect = null;
  const btn = document.getElementById('toggle-crop');
  if (btn) btn.textContent = scanState.cropMode ? '取消框選' : '框選單題區';
  const status = document.getElementById('scan-status');
  if (status) {
    status.style.display = scanState.cropMode ? 'block' : 'none';
    status.textContent = '請在照片上拖曳框出單一題目區，再按「辨識框選區」。';
  }
  const canvas = document.getElementById('scan-crop-canvas');
  drawScanCanvas(canvas && canvas._scanImage);
}

function recognizeCropSelection() {
  const canvas = document.getElementById('scan-crop-canvas');
  const r = scanState.cropRect;
  if (!canvas || !r || r.w < 20 || r.h < 20) {
    setScanStatus('請先框選一塊足夠大的題目區。');
    return;
  }
  const crop = document.createElement('canvas');
  crop.width = Math.round(r.w);
  crop.height = Math.round(r.h);
  crop.getContext('2d').drawImage(canvas, r.x, r.y, r.w, r.h, 0, 0, crop.width, crop.height);
  recognizeScan(crop.toDataURL('image/jpeg', 0.94));
}

function setScanStatus(message) {
  const el = document.getElementById('scan-status');
  if (!el) return;
  el.style.display = 'block';
  el.textContent = message;
}

async function getOcrWorker(logger) {
  if (!window.Tesseract) throw new Error('找不到本機 OCR 套件，請確認 vendor/tesseract/tesseract.min.js 是否存在。');
  if (!ocrWorkerPromise) {
    ocrWorkerPromise = Tesseract.createWorker('chi_tra', 1, Object.assign({}, OCR_CONFIG, { logger: logger }));
  }
  return await ocrWorkerPromise;
}

async function recognizeScan(imageDataUrl) {
  try {
    setScanStatus('OCR 初始化中...');
    const worker = await getOcrWorker(function (m) {
      if (m && m.status) setScanStatus('OCR ' + m.status + (m.progress ? ' ' + Math.round(m.progress * 100) + '%' : ''));
    });
    setScanStatus('正在辨識照片文字...');
    const result = await worker.recognize(imageDataUrl);
    const text = result && result.data ? result.data.text : '';
    scanState.ocrText = text;
    const parts = splitOcrQuestions(text);
    scanState.results = parts.map(function (part) { return { segment: part, matches: findQuestionMatches(part), selected: 0 }; });
    renderScanResults();
  } catch (err) {
    renderScanError((err && err.message) ? err.message : String(err));
  }
}

function renderScanError(message) {
  let html = '<button id="back-btn" class="btn-back">← 返回</button>';
  html += '<h1>辨識沒有完成</h1>';
  html += '<div class="q-card"><div class="scan-status">' + escapeHtml(message) + '</div>';
  html += '<button id="retry-scan" class="btn-primary">重新拍照</button>';
  html += '<div class="mode-desc" style="margin-top:10px;">如果你是直接開啟 HTML 檔，瀏覽器可能會阻擋本機 worker/wasm。可改用本機伺服器開啟這個資料夾。</div></div>';
  document.getElementById('app').innerHTML = html;
  document.getElementById('back-btn').addEventListener('click', renderHome);
  document.getElementById('retry-scan').addEventListener('click', renderScanPage);
}

function renderScanResults() {
  let html = '<button id="back-btn" class="btn-back">← 返回</button>';
  html += '<h1>辨識結果</h1>';
  html += '<div class="mode-card-static"><div class="mode-title">找到 ' + scanState.results.length + ' 個題目區塊</div>';
  html += '<div class="mode-desc">高信心會直接顯示答案；低信心請改選候選題，或回上一頁框選單題區。</div></div>';
  if (scanState.results.length === 0) {
    html += '<div class="q-card"><div class="search-empty">沒有切出題目。可回上一頁框選單題區，或在下方貼上 OCR 文字重新比對。</div></div>';
  }
  scanState.results.forEach(function (res, idx) {
    const selected = res.matches[res.selected] || res.matches[0];
    html += renderScanResultCard(res, selected, idx);
  });
  html += '<div class="q-card"><div class="mode-title">OCR 原文</div>';
  html += '<textarea id="ocr-manual-text" class="ocr-textarea">' + escapeHtml(scanState.ocrText || '') + '</textarea>';
  html += '<button id="rerun-match" class="btn-secondary">用上方文字重新切題比對</button></div>';
  document.getElementById('app').innerHTML = html;
  document.getElementById('back-btn').addEventListener('click', renderScanPreview);
  document.getElementById('rerun-match').addEventListener('click', function () {
    const text = document.getElementById('ocr-manual-text').value;
    scanState.ocrText = text;
    scanState.results = splitOcrQuestions(text).map(function (part) { return { segment: part, matches: findQuestionMatches(part), selected: 0 }; });
    renderScanResults();
  });
  document.querySelectorAll('.scan-candidate').forEach(function (btn) {
    btn.addEventListener('click', function () {
      const resultIndex = parseInt(btn.dataset.result, 10);
      const matchIndex = parseInt(btn.dataset.match, 10);
      scanState.results[resultIndex].selected = matchIndex;
      renderScanResults();
    });
  });
}

function renderScanResultCard(res, selected, idx) {
  if (!selected) {
    return '<div class="scan-result-card"><div class="scan-result-head"><span>題目區塊 ' + (idx + 1) + '</span><span class="badge badge-no">無候選</span></div><div class="search-empty">無法比對題庫。</div></div>';
  }
  const q = selected.q;
  let html = '<div class="scan-result-card">';
  html += '<div class="scan-result-head"><span>題目區塊 ' + (idx + 1) + ' · ' + EXAM[q.exam].label + ' · 第 ' + q.ch + ' 章第 ' + q.n + ' 題</span>' + confidenceLabel(selected.score) + '</div>';
  html += '<div class="search-item-stem">' + escapeHtml(selected.preview) + '</div>';
  html += '<div class="scan-answer">答案：' + selected.answerLetter + '</div>';
  html += '<div class="scan-answer-option"><span class="opt-key">' + selected.answerLetter + '.</span>' + escapeHtml(selected.answerText) + '</div>';
  html += '<div class="explain"><b>解析</b>' + escapeHtml(q.exp).replace(/\n/g, '<br>') + '</div>';
  html += '<div class="scan-candidates">';
  res.matches.forEach(function (m, matchIdx) {
    html += '<button class="scan-candidate" data-result="' + idx + '" data-match="' + matchIdx + '">';
    html += (matchIdx === res.selected ? '✓ ' : '') + Math.round(m.score * 100) + '% · 第 ' + m.q.ch + ' 章第 ' + m.q.n + ' 題 · ' + escapeHtml(m.preview);
    html += '</button>';
  });
  html += '</div></div>';
  return html;
}

function renderHome() {
  const examConf = EXAM[currentExam];
  const examQs = questionsOfExam(currentExam);
  const total = examQs.length;

  // 統計只計入「目前考試」的題目
  const examAnswered = examQs.filter(function (q) { return progress.history[qid(q)]; });
  const examCorrect = examAnswered.filter(function (q) { return progress.history[qid(q)] === 'correct'; });
  const answered = examAnswered.length;
  const correct = examCorrect.length;
  const acc = answered > 0 ? Math.round(correct / answered * 100) : 0;
  const wrongIdsThisExam = progress.wrongIds.filter(function (id) {
    return id.indexOf(currentExam + "-") === 0;
  });
  const wrongCount = wrongIdsThisExam.length;

  let html = '<h1>📚 財管刷題</h1>';

  // 期中 / 期末 切換
  html += '<div class="exam-tabs">';
  ['midterm', 'final'].forEach(function (ex) {
    const c = EXAM[ex];
    html += '<button class="exam-tab ' + (ex === currentExam ? 'active' : '') + '" data-exam="' + ex + '">';
    html += c.label + '<span class="tab-sub">' + c.sub + '</span>';
    html += '</button>';
  });
  html += '</div>';

  html += '<div class="stat-grid">';
  html += '<div class="stat-card"><div class="stat-label">' + examConf.label + '總題數</div><div class="stat-num">' + total + '</div></div>';
  html += '<div class="stat-card"><div class="stat-label">已作答</div><div class="stat-num">' + answered + '</div></div>';
  html += '<div class="stat-card"><div class="stat-label">正確率</div><div class="stat-num">' + acc + '%</div></div>';
  html += '<div class="stat-card"><div class="stat-label">錯題數</div><div class="stat-num">' + wrongCount + '</div></div>';
  html += '</div>';

  // 搜尋框
  html += '<div class="search-wrap">';
  html += '<input type="search" id="search-input" class="search-input" placeholder="🔍 搜尋' + examConf.label + '題目關鍵字..." autocomplete="off">';
  html += '<div id="search-results"></div>';
  html += '</div>';

  html += '<h2>選擇模式</h2>';
  html += '<div class="mode-card" data-mode="camera"><div class="mode-title">📷 拍照查整頁答案</div><div class="mode-desc">整頁拍紙本考卷，本機 OCR 後自動比對題庫答案</div></div>';
  html += '<div class="mode-card" data-mode="chapter"><div class="mode-title">📖 依章節練習</div><div class="mode-desc">挑選一個章節依序練習</div></div>';

  const savedCount = parseInt(localStorage.getItem('fm_random_count') || '30');
  html += '<div class="mode-card-static"><div class="mode-title">🎲 隨機抽題</div>';
  html += '<div class="mode-desc">從' + examConf.label + '全部 ' + total + ' 題隨機洗牌出題</div>';
  html += '<div class="count-row">';
  html += '<span class="count-label">題數</span>';
  html += '<div class="count-pills" id="count-pills">';
  [10, 20, 30, 50, total].forEach(function (n) {
    const label = n === total ? '全部' : n;
    html += '<button class="count-pill ' + (n === savedCount ? 'active' : '') + '" data-count="' + n + '">' + label + '</button>';
  });
  html += '</div></div>';
  html += '<button class="btn-primary" id="start-random" style="margin-top: 12px;">開始</button>';
  html += '</div>';

  html += '<div class="mode-card ' + (wrongCount === 0 ? 'disabled' : '') + '" data-mode="wrong">';
  html += '<div class="mode-title">❌ 錯題複習' + (wrongCount > 0 ? ' (' + wrongCount + ')' : '') + '</div>';
  html += '<div class="mode-desc">' + (wrongCount > 0 ? '只看你在' + examConf.label + '答錯過的題目' : '目前還沒有錯題') + '</div></div>';

  if (answered > 0) {
    html += '<button id="reset-btn" class="btn-secondary">清除' + examConf.label + '紀錄</button>';
  }

  document.getElementById('app').innerHTML = html;

  // 期中 / 期末 切換
  document.querySelectorAll('.exam-tab').forEach(function (tab) {
    tab.addEventListener('click', function () {
      const ex = tab.dataset.exam;
      if (ex === currentExam) return;
      currentExam = ex;
      localStorage.setItem('fm_current_exam', ex);
      renderHome();
      window.scrollTo(0, 0);
    });
  });

  document.querySelectorAll('.mode-card').forEach(function (el) {
    el.addEventListener('click', function () {
      const mode = el.dataset.mode;
      if (mode === 'wrong' && wrongCount === 0) return;
      if (mode === 'camera') renderScanPage();
      else if (mode === 'chapter') renderChapterPicker();
      else if (mode === 'wrong') {
        const wrongQs = examQs.filter(function (q) { return progress.wrongIds.indexOf(qid(q)) !== -1; });
        startQuiz('wrong', shuffle(wrongQs));
      }
    });
  });

  // 隨機題數切換
  document.querySelectorAll('#count-pills .count-pill').forEach(function (pill) {
    pill.addEventListener('click', function () {
      document.querySelectorAll('#count-pills .count-pill').forEach(function (p) { p.classList.remove('active'); });
      pill.classList.add('active');
      localStorage.setItem('fm_random_count', pill.dataset.count);
    });
  });

  // 隨機抽題開始
  const startRandomBtn = document.getElementById('start-random');
  if (startRandomBtn) {
    startRandomBtn.addEventListener('click', function () {
      const activePill = document.querySelector('#count-pills .count-pill.active');
      const count = activePill ? parseInt(activePill.dataset.count) : 30;
      const picked = shuffle(examQs).slice(0, count);
      startQuiz('random', picked);
    });
  }

  const resetBtn = document.getElementById('reset-btn');
  if (resetBtn) {
    resetBtn.addEventListener('click', function () {
      if (confirm('確定要清除「' + examConf.label + '」的作答紀錄嗎?(另一份考試的紀錄會保留)')) {
        // 只清除目前考試的紀錄
        examQs.forEach(function (q) {
          const id = qid(q);
          if (progress.history[id]) {
            progress.totalAnswered--;
            if (progress.history[id] === 'correct') progress.totalCorrect--;
            delete progress.history[id];
          }
        });
        progress.wrongIds = progress.wrongIds.filter(function (id) {
          return id.indexOf(currentExam + "-") !== 0;
        });
        if (progress.totalAnswered < 0) progress.totalAnswered = 0;
        if (progress.totalCorrect < 0) progress.totalCorrect = 0;
        saveProgress();
        renderHome();
      }
    });
  }

  // 搜尋功能 (僅搜尋目前考試的題目)
  const searchInput = document.getElementById('search-input');
  const searchResults = document.getElementById('search-results');
  if (searchInput) {
    searchInput.addEventListener('input', function () {
      const kw = searchInput.value.trim().toLowerCase();
      if (kw === '') {
        searchResults.innerHTML = '';
        searchResults.style.display = 'none';
        return;
      }
      const matches = examQs.filter(function (q) {
        const hay = (q.stem + ' ' + q.opts.join(' ') + ' ' + q.exp).toLowerCase();
        return hay.indexOf(kw) !== -1;
      });
      if (matches.length === 0) {
        searchResults.innerHTML = '<div class="search-empty">找不到符合「' + escapeHtml(kw) + '」的題目</div>';
        searchResults.style.display = 'block';
        return;
      }
      let resHtml = '<div class="search-count">找到 ' + matches.length + ' 題</div>';
      matches.slice(0, 50).forEach(function (q) {
        const preview = q.stem.length > 60 ? q.stem.slice(0, 60) + '...' : q.stem;
        const previewClean = preview.replace(/\n/g, ' ');
        resHtml += '<div class="search-item" data-id="' + qid(q) + '">';
        resHtml += '<div class="search-item-meta">第 ' + q.ch + ' 章 第 ' + q.n + ' 題</div>';
        resHtml += '<div class="search-item-stem">' + highlightKeyword(previewClean, kw) + '</div>';
        resHtml += '</div>';
      });
      if (matches.length > 50) {
        resHtml += '<div class="search-empty">僅顯示前 50 題,請輸入更精確的關鍵字</div>';
      }
      searchResults.innerHTML = resHtml;
      searchResults.style.display = 'block';

      document.querySelectorAll('.search-item').forEach(function (item) {
        item.addEventListener('click', function () {
          const id = item.dataset.id;
          const q = QUESTIONS.find(function (x) { return qid(x) === id; });
          if (q) renderPreview(q);
        });
      });
    });
  }
}

function highlightKeyword(text, kw) {
  const escaped = escapeHtml(text);
  if (!kw) return escaped;
  const escKw = escapeHtml(kw);
  const regex = new RegExp(escKw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
  return escaped.replace(regex, function (m) { return '<mark>' + m + '</mark>'; });
}

function renderPreview(q) {
  const status = progress.history[qid(q)];
  let statusBadge = '';
  if (status === 'correct') statusBadge = '<span class="badge badge-ok">已答對</span>';
  else if (status === 'wrong') statusBadge = '<span class="badge badge-no">曾答錯</span>';

  let optsHtml = '';
  for (let i = 0; i < q.opts.length; i++) {
    const isAns = i === q.ans;
    optsHtml += '<div class="opt ' + (isAns ? 'correct' : '') + '" style="cursor: default;">';
    optsHtml += '<span class="opt-key">' + LETTERS[i] + '.</span>' + escapeHtml(q.opts[i]);
    optsHtml += '</div>';
  }

  let html = '<button id="back-btn" class="btn-back">← 返回首頁</button>';
  html += '<div class="meta-row"><span>' + EXAM[q.exam].label + ' · 第 ' + q.ch + ' 章 第 ' + q.n + ' 題 · ' + examName(q) + '</span>' + statusBadge + '</div>';
  html += '<div class="q-card">';
  html += '<div class="q-stem">' + escapeHtml(q.stem).replace(/\n/g, '<br>') + '</div>';
  html += '<div>' + optsHtml + '</div>';
  html += '<div class="explain"><b>正確答案:' + LETTERS[q.ans] + '</b>';
  html += escapeHtml(q.exp).replace(/\n/g, '<br>');
  html += '</div>';
  html += '</div>';

  document.getElementById('app').innerHTML = html;
  document.getElementById('back-btn').addEventListener('click', renderHome);
  window.scrollTo(0, 0);
}

function renderChapterPicker() {
  const examConf = EXAM[currentExam];
  let html = '<button id="back-btn" class="btn-back">← 返回</button>';
  html += '<h1>' + examConf.label + ' · 選擇章節</h1>';
  examConf.chapters.forEach(function (ch) {
    const chQs = QUESTIONS.filter(function (q) { return q.exam === currentExam && q.ch === ch; });
    const answered = chQs.filter(function (q) { return progress.history[qid(q)]; }).length;
    const correct = chQs.filter(function (q) { return progress.history[qid(q)] === 'correct'; }).length;
    html += '<div class="mode-card" data-ch="' + ch + '">';
    html += '<div class="mode-title">第 ' + ch + ' 章 · ' + examConf.names[ch] + '</div>';
    html += '<div class="mode-desc">' + chQs.length + ' 題 · 已做 ' + answered + '/' + chQs.length + ' · 正確 ' + correct + '</div>';
    html += '</div>';
  });
  document.getElementById('app').innerHTML = html;

  document.getElementById('back-btn').addEventListener('click', renderHome);
  document.querySelectorAll('.mode-card').forEach(function (el) {
    el.addEventListener('click', function () {
      const ch = parseInt(el.dataset.ch);
      const chQs = QUESTIONS.filter(function (q) { return q.exam === currentExam && q.ch === ch; });
      startQuiz('chapter-' + ch, chQs);
    });
  });
}

function startQuiz(mode, queue) {
  if (queue.length === 0) return;
  state = { mode: mode, queue: queue, idx: 0, answered: false };
  renderQuestion();
}

function renderQuestion() {
  const q = state.queue[state.idx];
  const total = state.queue.length;
  const progPct = Math.round(state.idx / total * 100);

  let modeLabel = EXAM[q.exam].label;
  if (state.mode === 'random') modeLabel += ' · 隨機抽題';
  else if (state.mode === 'wrong') modeLabel += ' · 錯題複習';
  else if (state.mode.indexOf('chapter-') === 0) modeLabel += ' · 第 ' + q.ch + ' 章';

  let optsHtml = '';
  for (let i = 0; i < q.opts.length; i++) {
    optsHtml += '<button class="opt" data-idx="' + i + '">';
    optsHtml += '<span class="opt-key">' + LETTERS[i] + '.</span>' + escapeHtml(q.opts[i]);
    optsHtml += '</button>';
  }

  let html = '<button id="back-btn" class="btn-back">← 返回首頁</button>';
  html += '<div class="meta-row"><span>' + modeLabel + ' · 第 ' + (state.idx + 1) + ' / ' + total + ' 題</span><span>第 ' + q.ch + ' 章 第 ' + q.n + ' 題</span></div>';
  html += '<div class="progress-bar"><div class="progress-fill" style="width: ' + progPct + '%"></div></div>';
  html += '<div class="q-card">';
  html += '<div class="q-stem">' + escapeHtml(q.stem).replace(/\n/g, '<br>') + '</div>';
  html += '<div id="opts">' + optsHtml + '</div>';
  html += '<div id="explain-area"></div>';
  html += '<div id="btn-area"></div>';
  html += '</div>';

  document.getElementById('app').innerHTML = html;

  document.getElementById('back-btn').addEventListener('click', function () {
    if (state.answered || confirm('離開將失去這次練習進度,確定要返回?')) {
      renderHome();
    }
  });

  document.querySelectorAll('#opts .opt').forEach(function (btn) {
    btn.addEventListener('click', function () {
      if (state.answered) return;
      onAnswer(parseInt(btn.dataset.idx));
    });
  });
}

function onAnswer(chosen) {
  const q = state.queue[state.idx];
  const correct = chosen === q.ans;
  state.answered = true;

  const id = qid(q);
  const wasAnswered = !!progress.history[id];
  const prevCorrect = progress.history[id] === 'correct';
  progress.history[id] = correct ? 'correct' : 'wrong';
  if (!wasAnswered) {
    progress.totalAnswered++;
    if (correct) progress.totalCorrect++;
  } else {
    if (correct && !prevCorrect) progress.totalCorrect++;
    if (!correct && prevCorrect) progress.totalCorrect--;
  }
  if (correct) {
    progress.wrongIds = progress.wrongIds.filter(function (x) { return x !== id; });
  } else {
    if (progress.wrongIds.indexOf(id) === -1) progress.wrongIds.push(id);
  }
  saveProgress();

  document.querySelectorAll('#opts .opt').forEach(function (btn, i) {
    btn.disabled = true;
    if (i === q.ans) btn.classList.add('correct');
    else if (i === chosen) btn.classList.add('wrong');
  });

  let expHtml = '<div class="explain">';
  expHtml += '<b>' + (correct ? '✓ 答對了' : '✗ 答錯了') + ' · 正確答案:' + LETTERS[q.ans] + '</b>';
  expHtml += escapeHtml(q.exp).replace(/\n/g, '<br>');
  expHtml += '</div>';
  document.getElementById('explain-area').innerHTML = expHtml;

  const isLast = state.idx === state.queue.length - 1;
  document.getElementById('btn-area').innerHTML = '<button id="next-btn" class="btn-primary">' + (isLast ? '完成' : '下一題 →') + '</button>';
  document.getElementById('next-btn').addEventListener('click', function () {
    if (isLast) renderComplete();
    else {
      state.idx++;
      state.answered = false;
      renderQuestion();
      window.scrollTo(0, 0);
    }
  });
}

function renderComplete() {
  const total = state.queue.length;
  const correctCount = state.queue.filter(function (q) { return progress.history[qid(q)] === 'correct'; }).length;
  const acc = Math.round(correctCount / total * 100);

  let html = '<div class="complete">';
  html += '<div class="complete-title">🎉 完成這輪練習!</div>';
  html += '<div class="stat-grid" style="max-width: 320px; margin: 0 auto 20px;">';
  html += '<div class="stat-card"><div class="stat-label">總題數</div><div class="stat-num">' + total + '</div></div>';
  html += '<div class="stat-card"><div class="stat-label">答對</div><div class="stat-num">' + correctCount + '</div></div>';
  html += '<div class="stat-card"><div class="stat-label">正確率</div><div class="stat-num">' + acc + '%</div></div>';
  html += '<div class="stat-card"><div class="stat-label">答錯</div><div class="stat-num">' + (total - correctCount) + '</div></div>';
  html += '</div>';
  html += '<button id="home-btn" class="btn-primary">回到首頁</button>';
  html += '</div>';

  document.getElementById('app').innerHTML = html;
  document.getElementById('home-btn').addEventListener('click', renderHome);
}

renderHome();
</script>
</body>
